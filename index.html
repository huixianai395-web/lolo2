
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>小手机 v1.4.0 稳定</title>
  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --line:#e6e9f5;
      --bg:#f6f8ff;
      --blue:#2f66d8;
      --glass: rgba(255,255,255,.30);
      --glass-border: rgba(255,255,255,.48);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;height:100%;
      background:linear-gradient(160deg,#2c57c8,#5ba9ff);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    #app{
      width:100%;
      max-width:430px;
      height:100dvh;
      min-height:100dvh;
      margin:0 auto;
      position:relative;
      overflow:hidden;
      background:var(--bg);
    }

    .screen{position:absolute;inset:0;display:none;background:var(--bg)}
    .screen.active{display:block}

    .header{
      height:calc(52px + var(--safe-top));
      padding-top:var(--safe-top);
      display:flex;align-items:center;justify-content:space-between;
      padding-left:12px;padding-right:12px;
      background:linear-gradient(180deg,#f8f9ff,#f6f8ff);
      border-bottom:1px solid var(--line);
      gap:8px;
    }

    .btn{
      border:none;border-radius:10px;padding:8px 12px;font-size:13px;
      background:#edf2ff;color:#173a7a;cursor:pointer;
    }
    .btn.p{background:var(--blue);color:#fff}
    .btn.d{background:#d9534f;color:#fff}

    .page{
      height:calc(100% - (52px + var(--safe-top)));
      overflow:auto;
      padding:12px;
      padding-bottom:calc(12px + var(--safe-bottom));
      display:flex;flex-direction:column;gap:10px;
      background:var(--bg);
    }

    .card{background:#fff;border:1px solid #ececf2;border-radius:14px;padding:12px}
    .small{font-size:12px;color:#777}
    .row{display:flex;gap:8px;align-items:center}
    .input,.ta,.select{
      width:100%;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fff;
      font-size:16px;
    }
    .ta{resize:none}
    .hidden{display:none !important}

    /* HOME */
    #home{color:#fff}
    .wall{
      position:absolute;inset:0;z-index:0;
      background:
        linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)),
        url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
    }
    .home-layer{
      position:relative;z-index:2;height:100%;
      padding:calc(18px + var(--safe-top)) 12px calc(14px + var(--safe-bottom));
      display:flex;flex-direction:column;
    }
    .date{font-size:15px;opacity:.95}
    .time{
      font-size:72px;line-height:1.02;font-weight:760;letter-spacing:-2px;
      text-shadow:0 2px 12px rgba(0,0,0,.2);
    }

    /* 风铃 */
    .windchime{
      position:absolute;
      top:calc(6px + var(--safe-top));
      right:12px;
      width:72px;
      height:126px;
      transform-origin:top center;
      animation:chimeSwing 3.2s ease-in-out infinite;
      filter:drop-shadow(0 4px 10px rgba(0,0,0,.26));
      pointer-events:none;
      z-index:3;
    }
    .windchime .ring{
      width:28px;height:10px;margin:0 auto;
      border:2px solid rgba(255,255,255,.95);
      border-radius:999px;
      background:rgba(255,255,255,.18);
      backdrop-filter:blur(1px);
    }
    .windchime .line{
      position:absolute;top:10px;width:2px;
      background:linear-gradient(to bottom,rgba(255,255,255,.95),rgba(255,255,255,.18));
      transform-origin:top center;
    }
    .windchime .line span{
      position:absolute;left:50%;transform:translateX(-50%);
      border-radius:999px;
      background:rgba(255,255,255,.92);
      box-shadow:0 0 10px rgba(255,255,255,.5);
    }
    .windchime .l1{left:17px;height:42px;animation:lineSwingA 3.2s ease-in-out infinite}
    .windchime .l2{left:35px;height:55px;animation:lineSwingB 3.2s ease-in-out infinite}
    .windchime .l3{left:53px;height:46px;animation:lineSwingC 3.2s ease-in-out infinite}
    .windchime .l1 span{bottom:-6px;width:8px;height:8px}
    .windchime .l2 span{bottom:-7px;width:10px;height:10px}
    .windchime .l3 span{bottom:-6px;width:8px;height:8px}
    .windchime .pendulum{
      position:absolute;left:35px;top:66px;transform:translateX(-50%);
      width:2px;height:42px;
      background:linear-gradient(to bottom,rgba(255,255,255,.85),rgba(255,255,255,.2));
    }
    .windchime .pendulum::after{
      content:"";
      position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);
      width:22px;height:14px;
      border-radius:4px 4px 8px 8px;
      background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(220,240,255,.72));
      box-shadow:0 0 12px rgba(255,255,255,.5);
    }

    @keyframes chimeSwing{
      0%,100%{transform:rotate(8deg)}
      50%{transform:rotate(-8deg)}
    }
    @keyframes lineSwingA{
      0%,100%{transform:rotate(6deg)}
      50%{transform:rotate(-5deg)}
    }
    @keyframes lineSwingB{
      0%,100%{transform:rotate(3deg)}
      50%{transform:rotate(-3deg)}
    }
    @keyframes lineSwingC{
      0%,100%{transform:rotate(-5deg)}
      50%{transform:rotate(5deg)}
    }

    .widgets{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .widget{
      background:var(--glass);border:1px solid var(--glass-border);
      border-radius:18px;padding:10px 12px;backdrop-filter:blur(12px)
    }
    .widget .t{font-size:12px;opacity:.88}
    .widget .v{font-size:16px;font-weight:700;margin-top:4px}

    .grid{margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px}
    .icon{text-align:center;cursor:pointer}
    .ibox{
      width:62px;height:62px;margin:0 auto 6px;border-radius:16px;display:grid;place-items:center;
      background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.45);font-size:27px;
      transition:transform .12s ease;
    }
    .icon:active .ibox{transform:scale(.88)}
    .lab{font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.25)}

    /* Wechat list */
    .list{display:flex;flex-direction:column;gap:8px}
    .item{
      background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;
      display:flex;gap:10px;align-items:center;
    }
    .avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#eef2ff;flex-shrink:0}
    .main{flex:1;min-width:0;cursor:pointer}
    .name{font-weight:600;color:#222}
    .preview{margin-top:4px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t{font-size:11px;color:#999}

    /* Chat */
    #chatMsgs{
      height:calc(100% - (52px + var(--safe-top)) - (74px + var(--safe-bottom)));
      overflow:auto;
      padding:12px;
      background:linear-gradient(180deg,#edf2ff,#edf1f8);
      display:flex;flex-direction:column;gap:10px;
    }
    .msg-row{display:flex;gap:8px;align-items:flex-end}
    .msg-row.me{justify-content:flex-end}
    .chat-avatar{
      width:32px;height:32px;border-radius:10px;object-fit:cover;background:#dde6ff;flex-shrink:0;
    }
    .bubble{
      max-width:74%;
      padding:10px 12px;
      border-radius:14px;
      line-height:1.45;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .bubble.me{background:#2f66d8;color:#fff;border-bottom-right-radius:6px}
    .bubble.ai{background:#fff;border:1px solid #e8e8ef;border-bottom-left-radius:6px}

    .chatInputBar{
      position:absolute;left:0;right:0;bottom:0;
      padding:10px;
      padding-bottom:calc(10px + var(--safe-bottom));
      background:linear-gradient(180deg,#f8f9ff,#f6f8ff);
      border-top:1px solid #e4e8f5;
      display:flex;gap:8px;align-items:flex-end;
    }
    #chatInput{
      flex:1;
      height:44px;
      min-height:44px;
      max-height:96px;
      overflow-y:auto;
      resize:none;
    }
    .send-actions{
      display:flex;gap:8px;align-items:center;align-self:flex-end;
    }

    /* 储存键：风铃风 */
    .btn.store{
      width:40px;
      height:40px;
      padding:0;
      border-radius:999px;
      border:1px solid #cfe3ff;
      background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(233,244,255,.92));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.9),
        0 2px 8px rgba(88,126,196,.18);
      position:relative;
    }
    .btn.store::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:12px;
      height:12px;
      border-radius:999px;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle at 35% 30%, #fff, #d8eeff 62%, #a5cfff);
      border:1px solid rgba(167,201,244,.75);
      box-shadow:0 0 8px rgba(186,224,255,.45);
    }

    /* 你给的聊天头部样式 */
    .chat-head-center{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      flex:1;
      min-width:0;
      padding:0 8px;
    }
    .chat-head-title{
      width:100%;
      text-align:center;
      font-weight:700;
      color:#222;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .chat-head-sub{
      font-size:11px;
      color:#7a86a8;
      line-height:1.2;
      margin-top:2px;
      min-height:13px;
    }

    .icon-btn{
      width:32px;
      height:32px;
      border-radius:10px;
      border:1px solid #d7e3ff;
      background:linear-gradient(180deg,#f3f7ff,#e8f0ff);
      color:#4a67a8;
      font-size:16px;
      cursor:pointer;
      display:grid;
      place-items:center;
      box-shadow:0 1px 3px rgba(61,93,161,.12);
    }
    .icon-btn:active{transform:translateY(1px)}

    /* 离线酒馆风 */
    #chatRoom.offline #chatMsgs{
      background:linear-gradient(180deg,#f5efe4,#f2ebdf);
    }
    .msg-block{
      display:flex;
      flex-direction:column;
      gap:6px;
      max-width:calc(100% - 8px);
    }
    .msg-block.ai{align-items:flex-start;margin-right:auto}
    .msg-block.me{align-items:flex-end;margin-left:auto}
    #chatRoom.offline .chat-avatar{
      width:42px;height:42px;border-radius:12px;
    }
    #chatRoom.offline .bubble{
      max-width:calc(100vw - 72px);
      width:fit-content;
      line-height:1.6;
      border-radius:14px;
    }

    /* modal */
    .modal{
      position:absolute;inset:0;background:rgba(0,0,0,.35);
      display:none;place-items:center;z-index:99;padding:12px;
    }
    .modal.active{display:grid}
    .modal-card{
      width:100%;max-width:360px;max-height:90dvh;overflow:auto;
      background:#fff;border-radius:14px;padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .preview-img{
      width:64px;height:64px;border-radius:12px;object-fit:cover;
      border:1px solid #eee;background:#f3f5ff;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <section id="home" class="screen active">
    <div class="wall"></div>
    <div class="home-layer">
      <div class="windchime" aria-hidden="true">
        <div class="ring"></div>
        <div class="line l1"><span></span></div>
        <div class="line l2"><span></span></div>
        <div class="line l3"><span></span></div>
        <div class="pendulum"></div>
      </div>

      <div class="date" id="homeDate"></div>
      <div class="time" id="homeTime"></div>

      <div class="widgets">
        <div class="widget"><div class="t">纪念日</div><div class="v">第 233 天</div></div>
        <div class="widget"><div class="t">天气</div><div class="v">22°C 晴</div></div>
      </div>

      <div class="grid">
        <div class="icon" data-nav="wechat"><div class="ibox">💬</div><div class="lab">微信</div></div>
        <div class="icon" data-nav="api"><div class="ibox">🔑</div><div class="lab">API</div></div>
      </div>
    </div>
  </section>

  <!-- WECHAT -->
  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>微信</b>
      <button class="btn" id="addContactBtn">+联系人</button>
    </div>
    <div class="page">
      <input id="searchInput" class="input" placeholder="搜索联系人" />
      <div id="contactList" class="list"></div>
    </div>
  </section>

  <!-- CHAT -->
  <section id="chatRoom" class="screen">
    <div class="header">
      <button class="btn" data-nav="wechat">‹ 返回</button>

      <div class="chat-head-center">
        <div class="chat-head-title" id="chatTitle">聊天</div>
        <div class="chat-head-sub" id="chatSub">在线模式</div>
      </div>

      <button class="icon-btn" id="chatSettingBtn" aria-label="聊天设置">⚙</button>
    </div>

    <div id="chatMsgs"></div>

    <div class="chatInputBar">
      <textarea id="chatInput" class="ta" placeholder="输入消息..."></textarea>
      <div class="send-actions">
        <button class="btn store" id="storeBtn" aria-label="储存"></button>
        <button class="btn p" id="sendBtn">发送</button>
      </div>
    </div>
  </section>

  <!-- API -->
  <section id="api" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>API 设置</b>
      <button class="btn p" id="saveApiBtn">保存</button>
    </div>
    <div class="page">
      <div class="card">
        <div class="small">API预设</div>
        <div class="row" style="margin-top:8px;">
          <select id="apiPresetSelect" class="select"></select>
          <button class="btn" id="newPresetBtn">新建</button>
          <button class="btn d" id="delPresetBtn">删</button>
        </div>
      </div>

      <div class="card"><div class="small">Base URL</div><input id="apiBase" class="input" placeholder="https://api.xxx.com" /></div>
      <div class="card"><div class="small">API Key</div><input id="apiKey" class="input" type="password" /></div>
      <div class="card">
        <div class="small">Model</div>
        <select id="apiModel" class="select"></select>
        <div style="margin-top:8px"><button class="btn" id="fetchModelsBtn">拉取模型</button></div>
      </div>
      <div class="card"><div class="small">Temperature</div><input id="apiTemp" class="input" type="number" min="0" max="2" step="0.1" value="0.8" /></div>
      <div class="card"><button class="btn" id="testApiBtn">测试连接</button><div id="apiStatus" class="small" style="margin-top:8px;">状态：未测试</div></div>
    </div>
  </section>

  <!-- 创建联系人 -->
  <div id="contactModal" class="modal">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">创建联系人</h3>
      <div class="small">昵称</div>
      <input id="newName" class="input" placeholder="例如：林闻笙" />

      <div class="small" style="margin-top:8px;">头像（上传 或 URL）</div>
      <div class="row">
        <button class="btn" id="pickAvatarBtn">上传</button>
        <input id="newAvatarUrl" class="input" placeholder="https://..." />
      </div>
      <input id="newAvatarFile" type="file" accept="image/*" class="hidden" />
      <img id="newAvatarPreview" class="preview-img hidden" style="margin-top:8px;" />

      <div class="small" style="margin-top:8px;">人设</div>
      <textarea id="newPersona" class="ta" style="min-height:220px;"></textarea>

      <div class="row" style="justify-content:flex-end;margin-top:10px;">
        <button class="btn" id="cancelCreateBtn">取消</button>
        <button class="btn p" id="saveCreateBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 聊天设置 -->
  <div id="chatSettingModal" class="modal">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">聊天设置</h3>

      <div class="card" style="margin-bottom:10px;">
        <div class="small">我的人设</div>
        <textarea id="mePersonaInput" class="ta" style="min-height:88px;" placeholder="你自己的说话习惯、人设"></textarea>
      </div>

      <div class="card" style="margin-bottom:10px;">
        <div class="small">TA人设（当前联系人）</div>
        <textarea id="rolePersonaInput" class="ta" style="min-height:110px;" placeholder="越具体越稳"></textarea>
      </div>

      <div class="card" style="margin-bottom:10px;">
        <div class="small">模式</div>
        <select id="replyModeSelect" class="select" style="margin-top:8px;">
          <option value="online">线上模式（多气泡、逐条弹出）</option>
          <option value="offline">线下模式（酒馆风、单条沉浸）</option>
        </select>
      </div>

      <div class="card" id="onlineSettingCard" style="margin-bottom:10px;">
        <div class="small">线上条数</div>
        <select id="onlineStyleSelect" class="select" style="margin-top:8px;">
          <option value="free">自由发挥</option>
          <option value="range">区间条数</option>
        </select>
        <div id="onlineRangeBox" class="row" style="margin-top:8px;display:none;">
          <input id="onlineMinInput" class="input" type="number" min="1" max="20" value="2" placeholder="最少条数" />
          <input id="onlineMaxInput" class="input" type="number" min="1" max="30" value="6" placeholder="最多条数" />
        </div>
      </div>

      <div class="row" style="justify-content:space-between;margin-top:10px;">
        <button class="btn d" id="clearChatFromSettingBtn">清空当前聊天</button>
        <div class="row">
          <button class="btn" id="cancelChatSettingBtn">取消</button>
          <button class="btn p" id="saveChatSettingBtn">保存</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(() => {
  const K_CONTACT='mp_fix_contacts';
  const K_CHAT='mp_fix_chats';
  const K_API='mp_fix_api';
  const K_ME='mp_fix_me';

  const DEFAULT_CHAT_SETTINGS = {
    mode:'online',      // online | offline
    onlineStyle:'free', // free | range
    onlineMin:2,
    onlineMax:6
  };

  let currentId=null;
  let createAvatar='';

  const $ = id => document.getElementById(id);
  const getJ=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));}catch{return d;}};
  const setJ=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
  const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  const clean=s=>String(s||'').replace(/[\u0000-\u001F\u007F\uFFFD]/g,'').trim();
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));

  function normSettings(s={}){
    const o={...DEFAULT_CHAT_SETTINGS,...(s||{})};
    o.mode=o.mode==='offline'?'offline':'online';
    o.onlineStyle=o.onlineStyle==='range'?'range':'free';
    o.onlineMin=Math.max(1, Number(o.onlineMin||2));
    o.onlineMax=Math.max(o.onlineMin, Number(o.onlineMax||6));
    return o;
  }

  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const el=$(id); if(el) el.classList.add('active');
  }

  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>show(el.getAttribute('data-nav')));

  function tick(){
    const n=new Date(), h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()).padStart(2,'0');
    const w=['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
    $('homeDate').textContent=`${n.getMonth()+1}月${n.getDate()}日 ${w}`;
    $('homeTime').textContent=`${h}:${m}`;
  }
  tick(); setInterval(tick,1000);

  // data
  function getContacts(){
    const arr=getJ(K_CONTACT,[]);
    return Array.isArray(arr) ? arr.map(c=>({...c,settings:normSettings(c.settings)})) : [];
  }
  function setContacts(v){ setJ(K_CONTACT,(v||[]).map(c=>({...c,settings:normSettings(c.settings)}))); }
  function getChats(){return getJ(K_CHAT,{});}
  function setChats(v){setJ(K_CHAT,v);}
  function getMe(){return getJ(K_ME,{name:'我',avatar:'',persona:''});}
  function setMe(v){setJ(K_ME,v);}

  function getContactById(id){ return getContacts().find(x=>x.id===id); }
  function updateContact(id,patch){
    const arr=getContacts();
    const i=arr.findIndex(x=>x.id===id);
    if(i<0) return;
    arr[i]={...arr[i],...patch};
    if(patch.settings) arr[i].settings=normSettings(patch.settings);
    setContacts(arr);
  }

  // contacts
  function renderContacts(k=''){
    k=(k||'').trim();
    const arr=getContacts().filter(c=>!k||c.name.includes(k)||(c.preview||'').includes(k));
    $('contactList').innerHTML=arr.map(c=>`
      <div class="item">
        <img class="avatar" src="${c.avatar||'https://via.placeholder.com/88x88?text=头像'}"/>
        <div class="main" onclick="openChat('${c.id}')">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div class="name">${esc(c.name)}</div><div class="t">${esc(c.time||'')}</div>
          </div>

  function compressImage(file,maxSide=260,quality=0.5){
    return new Promise((resolve,reject)=>{
      const fr=new FileReader();
      fr.onload=()=>{
        const img=new Image();
        img.onload=()=>{
          let w=img.width,h=img.height;
          const s=Math.min(1,maxSide/Math.max(w,h));
          w=Math.round(w*s); h=Math.round(h*s);
          const c=document.createElement('canvas');
          c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          let out='';
          try{ out=c.toDataURL('image/webp',quality);}catch(e){}
          if(!out || out.startsWith('data:,')) out=c.toDataURL('image/jpeg',quality);
          resolve(out);
        };
        img.onerror=reject;
        img.src=fr.result;
      };
      fr.onerror=reject;
      fr.readAsDataURL(file);
    });
  }

  function forceSplitByLen(text,len){
    const out=[]; let i=0;
    while(i<text.length){ out.push(text.slice(i,i+len)); i+=len; }
    return out;
  }

  function parseJsonMessages(text){
    const t=clean(text);
    if(!t) return null;
    try{
      const j=JSON.parse(t);
      if(Array.isArray(j?.messages)) return j.messages.map(x=>clean(x)).filter(Boolean);
    }catch{}
    const m=t.match(/\{[\s\S]*\}/);
    if(m){
      try{
        const j=JSON.parse(m[0]);
        if(Array.isArray(j?.messages)) return j.messages.map(x=>clean(x)).filter(Boolean);
      }catch{}
    }
    return null;
  }

  function splitAiBubbles(raw){
    const txt=clean(raw);
    if(!txt) return ['...'];

    const byJson=parseJsonMessages(txt);
    if(byJson && byJson.length){
      const out=[];
      for(const s of byJson){
        if(s.length>42) out.push(...forceSplitByLen(s,28));
        else out.push(s);
      }
      return out.filter(Boolean);
    }

    const normalized=txt.replace(/\r/g,'').replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
    const blocks=normalized.split(/\n{2,}/).filter(Boolean);
    const pieces=[];

    for(const block of blocks){
      const segs=block.match(/[^。！？!?；;，,\n]+[。！？!?；;，,]?/g)||[block];
      let buf='';
      for(let seg of segs){
        seg=seg.trim(); if(!seg) continue;
        if(seg.length>40){
          if(buf){ pieces.push(buf); buf=''; }
          pieces.push(...forceSplitByLen(seg,28));
          continue;
        }
        if((buf+seg).length<=34){ buf+=seg; }
        else { if(buf) pieces.push(buf); buf=seg; }
      }
      if(buf) pieces.push(buf);
    }
    return pieces.filter(Boolean).length?pieces.filter(Boolean):[txt];
  }

  function enforceCountRange(parts,min,max){
    let arr=[...(parts||[])].filter(Boolean);
    min=Math.max(1,min); max=Math.max(min,max);

    while(arr.length<min){
      const idx=arr.findIndex(x=>x.length>12);
      if(idx<0) break;
      const one=arr[idx], mid=Math.floor(one.length/2);
      const a=clean(one.slice(0,mid)), b=clean(one.slice(mid));
      arr.splice(idx,1,...[a,b].filter(Boolean));
    }
    while(arr.length>max){
      const last=arr.pop();
      arr[arr.length-1]=clean((arr[arr.length-1]||'')+' '+last);
    }
    return arr.filter(Boolean);
  }

  async function emitAiSequential(parts,map,targetId,mode){
    for(let i=0;i<parts.length;i++){
      map[targetId]=map[targetId]||[];
      map[targetId].push({role:'assistant',text:parts[i],time:Date.now()});
      setChats(map);
      if(currentId===targetId) renderChat();

      const len=parts[i]?.length||8;
      let delay;
      if(mode==='offline'){
        delay=900+Math.floor(Math.random()*900)+Math.min(1200,len*10);
      }else{
        delay=(i===0?700:1200)+Math.floor(Math.random()*(i===0?700:1300))+Math.min(900,len*12);
      }
      await sleep(delay);
    }
  }

  // API

  function buildUrl(base,path){
    const b=(base||'').replace(/\/+$/,'');
    if(b.endsWith('/v1')) return b+path.replace('/v1','');
    return b+path;
  }

  async function callApi(messages){
    const cfg=saveApiForm();
    if(!cfg.base||!cfg.key) throw new Error('请先配置 Base URL 和 API Key');
    const url=buildUrl(cfg.base,'/v1/chat/completions');

    const r=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.key},
      body:JSON.stringify({model:cfg.model,temperature:cfg.temp,messages})
    });

    const ct=(r.headers.get('content-type')||'').toLowerCase();
    let data=null, raw='';
    if(ct.includes('application/json')) data=await r.json().catch(()=>null);
    else raw=await r.text().catch(()=>'');

    if(!r.ok){
      const msg=data?.error?.message||data?.message||raw?.slice(0,220)||('HTTP '+r.status);
      throw new Error(clean(msg)||('HTTP '+r.status));
    }

    const out=clean(data?.choices?.[0]?.message?.content||'');
    if(!out) throw new Error('接口返回为空内容');
    return out;
  }

  async function fetchModels(){
    try{
      const c=saveApiForm();
      if(!c.base||!c.key) throw new Error('请先配置 Base URL 和 API Key');
      $('apiStatus').textContent='状态：拉取模型中...';
      const url=buildUrl(c.base,'/v1/models');
      const r=await fetch(url,{headers:{'Authorization':'Bearer '+c.key}});
      const data=await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(data?.error?.message || ('HTTP '+r.status));
      const list=(data.data||[]).map(x=>x.id).filter(Boolean);
      if(!list.length) throw new Error('未返回模型列表');
      $('apiModel').innerHTML=list.map(m=>`<option>${m}</option>`).join('');
      if(list.includes(c.model)) $('apiModel').value=c.model;
      $('apiStatus').textContent='状态：模型拉取成功（'+list.length+'）';
    }catch(e){
      $('apiStatus').textContent='状态：拉取失败 -> '+e.message;
    }
  }

  async function testApi(){
    try{
      $('apiStatus').textContent='状态：测试中...';
      const out=await callApi([{role:'user',content:'只回复ok'}]);
      $('apiStatus').textContent='状态：连接成功 -> '+(out||'ok');
    }catch(e){
      $('apiStatus').textContent='状态：失败 -> '+e.message;

  function buildOnlineSystem(c,me,st){
    const rangeRule = st.onlineStyle==='range'
      ? `本次请回复 ${st.onlineMin}-${st.onlineMax} 条消息。`
      : `本次消息条数由你根据语境自由发挥。`;

    return [
      `你正在扮演：${c?.name||'聊天对象'}`,
      `TA人设：${c?.persona||'自然聊天'}`,
      `对方人设：${me?.persona||'自然聊天'}`,
      `目标：像真实聊天，不要客服腔，不要总结式说教。`,
      `规则：`,
      `1）使用即时聊天口吻，贴合人设，自然有温度。`,
      `2）如果内容偏多，必须拆成多条消息，不要堆成一大段。`,
      `3）单条消息不要太长，尽量短而自然。`,
      `4）不要输出markdown，不要解释规则。`,
      `5）只输出严格JSON：{"messages":["消息1","消息2"]}`,
      `6）${rangeRule}`
    ].join('\n');
  }

  function buildOfflineSystem(c,me){
    return [
      `你正在扮演：${c?.name||'聊天对象'}`,
      `TA人设：${c?.persona||'自然聊天'}`,
      `对方人设：${me?.persona||'自然聊天'}`,
      `请输出一条沉浸式长消息，采用酒馆角色扮演风格。`,
      `格式必须：`,
      `【状态】`,
      `时间：...`,
      `地点：...`,
      `情绪：...`,
      `关系：...`,
      `---`,
      `正文：...`,
      `要求：只输出一条完整文本，不要JSON，不要多条分段消息，不要解释自己。`
    ].join('\n');
  }

  async function sendMsg(){
    if(!currentId) return;
    const chatId=currentId;
    const c=getContactById(chatId);
    const st=normSettings(c?.settings);
    const me=getMe();

    const t=clean($('chatInput').value);
    if(t) pushUser(t);

    $('chatInput').value=''; resetInputH();
    if(currentId===chatId) renderChat();

    const map=getChats();
    const hist=(map[chatId]||[]).filter(x=>x.text&&x.text!=='...').slice(-30);
    if(!hist.length) return;

    map[chatId]=map[chatId]||[];
    map[chatId].push({role:'assistant',text:'...',typing:true,time:Date.now()});
    setChats(map);
    if(currentId===chatId) renderChat();

    try{
      const system = st.mode==='offline' ? buildOfflineSystem(c,me) : buildOnlineSystem(c,me,st);
      const messages=[
        {role:'system',content:system},
        ...hist.map(x=>({role:x.role==='user'?'user':'assistant',content:x.text}))
      ];

      const out=await callApi(messages);

      const arr=map[chatId]||[];
      if(arr.length && arr[arr.length-1].typing) arr.pop();

      let parts=[];
      if(st.mode==='offline'){
        parts=[clean(out)||'...'];
      }else{
        parts=splitAiBubbles(out);
        if(st.onlineStyle==='range'){
          parts=enforceCountRange(parts,st.onlineMin,st.onlineMax);
        }
      }

      await emitAiSequential(parts.length?parts:['...'], map, chatId, st.mode);

      const contacts=getContacts();
      const i=contacts.findIndex(x=>x.id===chatId);
      if(i>=0){
        contacts[i].preview=(parts[0]||'...').slice(0,40);
        contacts[i].time='刚刚';
        setContacts(contacts);
      }
      renderContacts($('searchInput').value||'');
    }catch(e){
      const arr=map[chatId]||[];
      if(arr.length && arr[arr.length-1].typing) arr.pop();
      arr.push({role:'assistant',text:'请求失败：'+clean(e.message),time:Date.now()});
      map[chatId]=arr;
      setChats(map);
      if(currentId===chatId) renderChat();
    }
  }

  $('sendBtn').onclick=sendMsg;

  $('chatInput').addEventListener('keydown',e=>{
    if(e.key==='Enter' && !e.shiftKey){
      e.preventDefault();
      if(e.ctrlKey || e.metaKey) sendMsg();
      else storeCurrentInput();
    }
  });

  $('saveChatSettingBtn').onclick=()=>{
    if(!currentId) return;

    const me=getMe();
    const mode = $('replyModeSelect').value==='offline'?'offline':'online';

    const onlineMin = Math.max(1, Number($('onlineMinInput').value||2));
    const onlineMax = Math.max(onlineMin, Number($('onlineMaxInput').value||6));

    setMe({...me, persona:clean($('mePersonaInput').value)});

    updateContact(currentId,{
      persona:clean($('rolePersonaInput').value),
      settings:normSettings({mode,onlineStyle,onlineMin,onlineMax})

    applyModeUI();
    renderChat();
    closeChatSetting();
  };

  renderContacts();
})();
