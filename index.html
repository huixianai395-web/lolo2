<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Home UI</title>
  <style>
    :root{
      --glass: rgba(255,255,255,.28);
      --glass-border: rgba(255,255,255,.45);
      --text: #fff;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;}
    #phone{
      width:100%;
      max-width:430px;
      height:100dvh;
      margin:0 auto;
      position:relative;
      overflow:hidden;
      color:var(--text);
      background:#111;
    }

    /* 背景 */
    .wallpaper{
      position:absolute;inset:0;z-index:0;
      background:
        linear-gradient(160deg, rgba(41,97,255,.35), rgba(132,224,255,.18)),
        url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
    }

    /* 飘花 */
    #petals{
      position:absolute;inset:0;z-index:1;pointer-events:none;
    }

    .layer{
      position:relative;z-index:2;height:100%;
      display:flex;flex-direction:column;
      padding:18px 12px 14px;
    }

    /* 风铃 */
    .windchime{
      position:absolute;right:14px;top:26px;
      width:56px;height:130px;opacity:.88;
      transform-origin:top center;
      animation:swing 3.4s ease-in-out infinite;
      pointer-events:none;
    }
    .windchime:before{
      content:"";position:absolute;left:27px;top:0;width:2px;height:62px;
      background:linear-gradient(#ffe4a8,#9a733a);
    }
    .windchime:after{
      content:"";position:absolute;left:9px;top:60px;width:38px;height:38px;
      border-radius:50%;
      border:2px solid rgba(230,197,133,.85);
      box-shadow:inset 0 0 18px rgba(0,0,0,.25);
    }
    @keyframes swing{
      0%,100%{transform:rotate(5deg)}
      50%{transform:rotate(-5deg)}
    }

    /* 大时钟 */
    .clock{
      margin-top:8px;
      padding:4px 4px 0;
      text-shadow:0 2px 12px rgba(0,0,0,.22);
    }
    .date{
      font-size:15px;opacity:.95;
      margin-left:2px;
    }
    .time{
      font-size:72px;
      line-height:1.02;
      letter-spacing:-2px;
      font-weight:760;
      margin-top:2px;
    }

    /* 小组件 */
    .widgets{
      margin-top:10px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .widget{
      background:var(--glass);
      border:1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius:18px;
      padding:10px 12px;
    }
    .widget .t{font-size:12px;opacity:.88}
    .widget .v{font-size:16px;font-weight:700;margin-top:4px}

    /* 图标宫格 */
    .grid{
      margin-top:14px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px 8px;
      padding:0 2px;
    }
    .icon{text-align:center}
    .icon-box{
      width:62px;height:62px;margin:0 auto 6px;
      border-radius:16px;
      display:grid;place-items:center;
      background:var(--glass);
      border:1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size:27px;
      transition:transform .12s ease;
    }
    .icon:active .icon-box{transform:scale(.88)}
    .label{
      font-size:12px;
      text-shadow:0 1px 2px rgba(0,0,0,.25);
    }

    /* Dock */
    .dock-wrap{
      margin-top:auto;
      padding:10px 2px 0;
    }
    .dock{
      border-radius:26px;
      padding:10px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      background:rgba(255,255,255,.26);
      border:1px solid rgba(255,255,255,.42);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .dock .label{display:none}
  </style>
</head>
<body>
  <div id="phone">
    <div class="wallpaper"></div>
    <canvas id="petals"></canvas>
    <div class="windchime"></div>

    <div class="layer">
      <div class="clock">
        <div class="date" id="dateText">1月1日 周一</div>
        <div class="time" id="timeText">12:00</div>
      </div>

      <div class="widgets">
        <div class="widget">
          <div class="t">纪念日</div>
          <div class="v">第 233 天</div>
        </div>
        <div class="widget">
          <div class="t">天气</div>
          <div class="v">22°C 晴</div>
        </div>
      </div>

      <div class="grid">
        <div class="icon"><div class="icon-box">💬</div><div class="label">消息</div></div>
        <div class="icon"><div class="icon-box">📖</div><div class="label">世界书</div></div>
        <div class="icon"><div class="icon-box">🎨</div><div class="label">外观</div></div>
        <div class="icon"><div class="icon-box">🔑</div><div class="label">API</div></div>
        <div class="icon"><div class="icon-box">📱</div><div class="label">查手机</div></div>
        <div class="icon"><div class="icon-box">📚</div><div class="label">书籍</div></div>
        <div class="icon"><div class="icon-box">🛍️</div><div class="label">拼多多</div></div>
        <div class="icon"><div class="icon-box">🖋️</div><div class="label">同人文</div></div>
      </div>

      <div class="dock-wrap">
        <div class="dock">
          <div class="icon"><div class="icon-box">💬</div><div class="label">消息</div></div>
          <div class="icon"><div class="icon-box">📱</div><div class="label">查手机</div></div>
          <div class="icon"><div class="icon-box">🎨</div><div class="label">外观</div></div>
          <div class="icon"><div class="icon-box">🔑</div><div class="label">API</div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 时钟
    function tick(){
      const n = new Date();
      const h = String(n.getHours()).padStart(2,'0');
      const m = String(n.getMinutes()).padStart(2,'0');
      const w = ['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
      document.getElementById('timeText').textContent = `${h}:${m}`;
      document.getElementById('dateText').textContent = `${n.getMonth()+1}月${n.getDate()}日 ${w}`;
    }
    tick();
    setInterval(tick, 1000);

    // 飘花粒子
    const canvas = document.getElementById('petals');
    const ctx = canvas.getContext('2d');
    let petals = [];

    function resize(){
      const phone = document.getElementById('phone');
      canvas.width = phone.clientWidth;
      canvas.height = phone.clientHeight;
      petals = Array.from({length:42}, ()=>({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        rx:Math.random()*2.4+1.2,
        ry:Math.random()*1.8+0.8,
        vy:Math.random()*0.55+0.2,
        vx:(Math.random()-0.5)*0.35,
        a:Math.random()*0.45+0.15
      }));
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      petals.forEach(p=>{
        p.x += p.vx;
        p.y += p.vy;

        if(p.y > canvas.height + 10){ p.y = -10; p.x = Math.random()*canvas.width; }
        if(p.x < -10) p.x = canvas.width + 10;
        if(p.x > canvas.width + 10) p.x = -10;

        ctx.beginPath();
        ctx.ellipse(p.x, p.y, p.rx, p.ry, 0, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255, 214, 214, ${p.a})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    resize();
    draw();
    window.addEventListener('resize', resize);
  </script>
</body>
</html>
