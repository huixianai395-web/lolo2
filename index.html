<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Noctis Clean v1</title>
<style>
:root{
  --bg:#0b1020;--card:#151d33;--card2:#1b2642;--bd:#2d3b61;
  --tx:#eef2ff;--sub:#9fb0d6;--ac:#d8b489;--ac2:#f2d6af;--ok:#6fe0a5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx)}
.app{height:100%;display:flex;flex-direction:column}
.hd{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(10,14,26,.7)}
.hd .left{display:flex;align-items:center;gap:8px}
.btn{border:1px solid var(--bd);background:var(--card2);color:var(--tx);border-radius:10px;padding:8px 10px;font-size:12px}
.main{flex:1;overflow:hidden;position:relative}
.page{display:none;height:100%;overflow:auto;padding:12px}
.page.active{display:block}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:12px;margin-bottom:10px}
.sub{color:var(--sub);font-size:12px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(255,255,255,.08);background:#0f162a}
.tab{border:none;background:none;color:var(--sub);padding:10px 0;font-size:12px}
.tab.active{color:var(--ac2)}
.input,.ta,.sel{
  width:100%;border:1px solid var(--bd);background:var(--card2);color:var(--tx);border-radius:10px;padding:10px;font-size:13px
}
.ta{min-height:88px;resize:vertical}
.row{display:flex;gap:8px}
.row>div{flex:1}
.homeClock{font-size:34px;font-weight:800}
.homeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.appIcon{border:1px solid var(--bd);background:var(--card2);border-radius:12px;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:6px}
.appIcon .i{font-size:22px}
.appIcon .t{font-size:12px}
.chatList{display:flex;flex-direction:column;gap:8px;padding-bottom:8px}
.line{display:flex;gap:8px;align-items:flex-start}
.line.me{justify-content:flex-end}
.bubble{max-width:76%;padding:9px 11px;border-radius:12px;line-height:1.55;font-size:14px}
.ai{background:var(--card2);border:1px solid var(--bd)}
.meB{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#1a1a1a}
.tm{font-size:10px;opacity:.6;margin-top:4px}
.inputBar{border-top:1px solid rgba(255,255,255,.08);padding:8px;display:flex;gap:8px;background:#0f162a}
#inp{flex:1;min-height:42px;max-height:120px;resize:none}
.roleItem{border:1px solid var(--bd);background:var(--card2);border-radius:10px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px}
.badge{font-size:11px;color:var(--ok)}
.small{font-size:11px}
.status{font-size:11px}
.ok{color:var(--ok)}
.off{color:var(--sub)}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <div class="left">
      <button id="backBtn" class="btn">返回</button>
      <div id="titleTxt">首页</div>
    </div>
    <div id="statusTxt" class="status off">未配置</div>
  </div>

  <div class="main">
    <section id="page-home" class="page active">
      <div class="card">
        <div class="homeClock" id="clockTxt">00:00</div>
        <div class="sub" id="dateTxt">--</div>
      </div>
      <div class="card">
        <div style="font-weight:700" id="pfName">Noctis 用户</div>
        <div class="sub" id="pfSign">还没写签名</div>
      </div>
      <div class="card">
        <div class="homeGrid" id="homeGrid"></div>
      </div>
    </section>

    <section id="page-chat" class="page">
      <div id="chatList" class="chatList"></div>
    </section>

    <section id="page-roles" class="page">
      <div class="card">
        <div style="font-weight:700;margin-bottom:8px">角色列表</div>
        <div id="roleList"></div>
      </div>
      <div class="card">
        <div style="font-weight:700;margin-bottom:8px">新建/编辑</div>
        <input type="hidden" id="rId">
        <div class="row">
          <div><input id="rName" class="input" placeholder="角色名"></div>
          <div><input id="rAvatar" class="input" placeholder="头像字(2字内)"></div>
        </div>
        <div style="height:8px"></div>
        <input id="rGreeting" class="input" placeholder="开场白">
        <div style="height:8px"></div>
        <textarea id="rPrompt" class="ta" placeholder="System Prompt"></textarea>
        <div style="height:8px"></div>
        <div class="row">
          <button id="saveRoleBtn" class="btn">保存</button>
          <button id="resetRoleBtn" class="btn">清空</button>
          <button id="delRoleBtn" class="btn">删除</button>
        </div>
      </div>
    </section>

    <section id="page-settings" class="page">
      <div class="card">
        <div style="font-weight:700;margin-bottom:8px">个人资料</div>
        <input id="pfNameInp" class="input" placeholder="昵称">
        <div style="height:8px"></div>
        <input id="pfSignInp" class="input" placeholder="签名">
        <div style="height:8px"></div>
        <button id="savePfBtn" class="btn">保存资料</button>
      </div>

      <div class="card">
        <div style="font-weight:700;margin-bottom:8px">API设置</div>
        <input id="cUrl" class="input" placeholder="反代地址(不带/v1)">
        <div style="height:8px"></div>
        <input id="cKey" class="input" type="password" placeholder="API Key">
        <div style="height:8px"></div>
        <input id="cModel" class="input" placeholder="模型名，如 gpt-4o-mini">
        <div style="height:8px"></div>
        <div class="row">
          <div><input id="cTemp" class="input" type="number" step="0.1" min="0" max="2" placeholder="Temperature"></div>
          <div><input id="cMax" class="input" type="number" min="64" max="4096" placeholder="Max Tokens"></div>
        </div>
        <div style="height:8px"></div>
        <div class="row">
          <div>
            <select id="chatMode" class="sel">
              <option value="online">线上模式（即时聊天）</option>
              <option value="offline">线下模式（沉浸单条）</option>
            </select>
          </div>
        </div>
        <div style="height:8px"></div>
        <div class="row">
          <label class="small"><input id="multiOn" type="checkbox"> 线上区间多条</label>
        </div>
        <div style="height:8px"></div>
        <div class="row">
          <div><input id="multiMin" class="input" type="number" min="1" max="6" placeholder="最少条"></div>
          <div><input id="multiMax" class="input" type="number" min="1" max="6" placeholder="最多条"></div>
        </div>
        <div style="height:8px"></div>
        <div class="row">
          <button id="saveCfgBtn" class="btn">保存配置</button>
          <button id="testBtn" class="btn">测试连接</button>
        </div>
      </div>
    </section>
  </div>

  <div id="chatInputBar" class="inputBar" style="display:none">
    <textarea id="inp" class="input" placeholder="说点什么"></textarea>
    <button id="sendBtn" class="btn">发送</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-page="home">首页</button>
    <button class="tab" data-page="chat">聊天</button>
    <button class="tab" data-page="roles">角色</button>
    <button class="tab" data-page="settings">设置</button>
  </div>
</div>

<script>
(function(){
  var CFG_KEY='nx_cfg', ROLE_KEY='nx_roles', ACT_KEY='nx_active_role', HMAP_KEY='nx_hmap', PF_KEY='nx_profile';
  var C={url:'',key:'',model:'',temp:0.8,max:800,chatMode:'online',multiOn:false,multiMin:2,multiMax:3};
  var roles=[],activeRoleId='',HMap={},PF={name:'Noctis 用户',sign:'还没写签名'};
  var streaming=false;

  function $(s){ return document.querySelector(s); }
  function $$(s){ return Array.prototype.slice.call(document.querySelectorAll(s)); }
  function load(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
  function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  function now(){
    var d=new Date(); return (d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
  }
  function esc(s){
    s = s || '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function uid(){ return 'r_'+Math.random().toString(36).slice(2,10); }
  function toast(msg){
    var t=document.createElement('div');
    t.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#151d33;border:1px solid #2d3b61;padding:8px 14px;border-radius:20px;font-size:12px;z-index:99999';
    t.textContent=msg; document.body.appendChild(t); setTimeout(function(){t.remove();},1800);
  }
  function norm(u){ return String(u||'').trim().replace(/\/+$/,'').replace(/\/v1$/,''); }
  function api(base,p){ return norm(base)+'/v1'+p; }

  function currentRole(){
    for(var i=0;i<roles.length;i++) if(roles[i].id===activeRoleId) return roles[i];
    return null;
  }
  function currentHistory(){
    if(!activeRoleId) return [];
    if(!HMap[activeRoleId]) HMap[activeRoleId]=[];
    return HMap[activeRoleId];
  }

  function setStatus(){
    var ok=!!(C.url&&C.key&&C.model);
    $('#statusTxt').textContent=ok?'在线':'未配置';
    $('#statusTxt').className='status '+(ok?'ok':'off');
  }

  function syncModeNow(){
    var sel=$('#chatMode');
    var m=(sel&&sel.value==='offline')?'offline':'online';
    C.chatMode=m; save(CFG_KEY,C);
    return m;
  }

  function switchPage(name){
    $$('.page').forEach(function(p){ p.classList.remove('active'); });
    $('#page-'+name).classList.add('active');
    $$('.tab').forEach(function(b){ b.classList.remove('active'); if(b.getAttribute('data-page')===name) b.classList.add('active'); });
    $('#titleTxt').textContent = name==='home'?'首页':(name==='chat'?'聊天':(name==='roles'?'角色':'设置'));
    $('#chatInputBar').style.display = (name==='chat')?'flex':'none';
  }

  function renderClock(){
    var d=new Date();
    $('#clockTxt').textContent=now();
    $('#dateTxt').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日 星期'+'日一二三四五六'.charAt(d.getDay());
  }

  function renderProfile(){
    $('#pfName').textContent=PF.name||'Noctis 用户';
    $('#pfSign').textContent=PF.sign||'还没写签名';
    $('#pfNameInp').value=PF.name||'';
    $('#pfSignInp').value=PF.sign||'';
  }

  function renderHomeApps(){
    var apps=[
      {name:'消息',icon:'💬',page:'chat'},
      {name:'角色',icon:'👥',page:'roles'},
      {name:'设置',icon:'⚙️',page:'settings'},
      {name:'世界书',icon:'📘',tip:'v2加'},
      {name:'预设',icon:'🧷',tip:'v2加'},
      {name:'表情包',icon:'🧩',tip:'v2加'},
      {name:'导出',icon:'📤',tip:'v2加'},
      {name:'论坛',icon:'🌐',tip:'预留'}
    ];
    var h='';
    for(var i=0;i<apps.length;i++){
      h+='<button class="appIcon" data-i="'+i+'" type="button"><div class="i">'+apps[i].icon+'</div><div class="t">'+apps[i].name+'</div></button>';
    }
    $('#homeGrid').innerHTML=h;
    $$('#homeGrid .appIcon').forEach(function(el){
      el.addEventListener('click',function(){
        var a=apps[parseInt(el.getAttribute('data-i'),10)];
        if(a.page){ switchPage(a.page); return; }
        toast(a.tip||'预留入口');
      });
    });
  }

  function renderRoles(){
    var box=$('#roleList');
    if(!roles.length){ box.innerHTML='<div class="sub">还没有角色</div>'; return; }
    var h='';
    for(var i=0;i<roles.length;i++){
      var r=roles[i];
      h+='<div class="roleItem">'+
         '<div><div>'+esc(r.name||'未命名')+'</div><div class="sub">'+(r.prompt?'已设人设':'无人设')+'</div></div>'+
         '<div>'+
         '<button class="btn small" data-act="use" data-id="'+r.id+'">使用</button> '+
         '<button class="btn small" data-act="edit" data-id="'+r.id+'">编辑</button>'+
         '</div></div>';
    }
    box.innerHTML=h;
    $$('#roleList button').forEach(function(b){
      b.addEventListener('click',function(){
        var id=b.getAttribute('data-id'),act=b.getAttribute('data-act');
        if(act==='use'){
          activeRoleId=id; save(ACT_KEY,activeRoleId); renderRoles(); renderChat(); toast('已切换角色');
        }else{
          for(var i=0;i<roles.length;i++){
            if(roles[i].id===id){
              $('#rId').value=roles[i].id;
              $('#rName').value=roles[i].name||'';
              $('#rAvatar').value=roles[i].avatar||'';
              $('#rGreeting').value=roles[i].greeting||'';
              $('#rPrompt').value=roles[i].prompt||'';
              break;
            }
          }
        }
      });
    });
  }

  function renderChat(){
    var list=$('#chatList'), r=currentRole(), H=currentHistory();
    if(!r){
      list.innerHTML='<div class="card">先去角色页创建角色。</div>'; return;
    }
    if(!H.length){
      list.innerHTML='<div class="card"><div style="font-weight:700">'+esc(r.name)+'</div><div class="sub" style="margin-top:6px">'+esc(r.greeting||'可以开始聊天了。')+'</div></div>';
      return;
    }
    var h='';
    for(var i=0;i<H.length;i++){
      var m=H[i], me=(m.role==='user');
      h+='<div class="line '+(me?'me':'')+'"><div class="bubble '+(me?'meB':'ai')+'">'+
      '<div>'+esc(m.content||'').replace(/\n/g,'<br>')+'</div><div class="tm">'+(m.time||'')+'</div></div></div>';
    }
    list.innerHTML=h;
    list.scrollTop=list.scrollHeight;
  }

  function resetRoleForm(){
    $('#rId').value=''; $('#rName').value=''; $('#rAvatar').value=''; $('#rGreeting').value=''; $('#rPrompt').value='';
  }

  function saveRole(){
    var id=$('#rId').value||uid();
    var obj={
      id:id,
      name:($('#rName').value||'').trim(),
      avatar:($('#rAvatar').value||'AI').slice(0,2),
      greeting:($('#rGreeting').value||'').trim(),
      prompt:($('#rPrompt').value||'').trim()
    };
    if(!obj.name){ toast('角色名不能为空'); return; }
    var idx=-1;
    for(var i=0;i<roles.length;i++) if(roles[i].id===id){ idx=i; break; }
    if(idx>=0) roles[idx]=obj; else roles.unshift(obj);
    if(!activeRoleId) activeRoleId=id;
    save(ROLE_KEY,roles); save(ACT_KEY,activeRoleId);
    renderRoles(); renderChat(); resetRoleForm(); toast('角色已保存');
  }

  function delRole(){
    var id=$('#rId').value||activeRoleId;
    if(!id){ toast('无角色'); return; }
    roles=roles.filter(function(x){ return x.id!==id; });
    delete HMap[id];
    if(activeRoleId===id) activeRoleId=roles.length?roles[0].id:'';
    save(ROLE_KEY,roles); save(ACT_KEY,activeRoleId); save(HMAP_KEY,HMap);
    resetRoleForm(); renderRoles(); renderChat(); toast('已删除');
  }

  async function callChat(messages){
    var res=await fetch(api(C.url,'/chat/completions'),{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+C.key},
      body:JSON.stringify({model:C.model,messages:messages,temperature:C.temp,max_tokens:C.max,stream:false})
    });
    if(!res.ok){
      var t=await res.text();
      throw new Error(String(res.status)+' '+t.slice(0,120));
    }
    var j=await res.json();
    return (((j||{}).choices||[])[0]||{}).message ? ((((j||{}).choices||[])[0]||{}).message.content||'') : '';
  }

  function pickReplyCount(){
    var a=parseInt(C.multiMin,10)||1,b=parseInt(C.multiMax,10)||1;
    if(a<1) a=1; if(b<1) b=1; if(a>b){ var t=a;a=b;b=t; }
    return Math.floor(Math.random()*(b-a+1))+a;
  }

  function parseMsgs(out){
    out=String(out||'').trim();
    var arr=[],m,reg=/<msg>([\s\S]*?)<\/msg>/gi;
    while((m=reg.exec(out))!==null){ var t=(m[1]||'').trim(); if(t) arr.push(t); }
    if(arr.length) return arr;
    var x=out.split(/\n{2,}|\n+/).map(function(s){return s.trim();}).filter(Boolean);
    return x.length?x:[out];
  }

  async function requestReply(){
    if(streaming) return;
    var r=currentRole();
    if(!r){ toast('先选角色'); return; }
    if(!(C.url&&C.key&&C.model)){ toast('先配置API'); return; }

    var mode=syncModeNow();
    var inp=$('#inp'),txt=(inp.value||'').trim();
    if(txt){
      currentHistory().push({role:'user',content:txt,time:now(),mode:mode});
      inp.value=''; inp.style.height='42px';
      save(HMAP_KEY,HMap); renderChat();
    }
    var H=currentHistory();
    if(!H.length){ toast('先发消息'); return; }

    streaming=true; $('#sendBtn').disabled=true; $('#statusTxt').textContent='输入中...';

    try{
      var M=H.map(function(x){ return {role:x.role==='assistant'?'assistant':'user',content:x.content||''}; });
      var sys=[];
      if(r.prompt) sys.push({role:'system',content:r.prompt});

      if(mode==='online'){
        if(C.multiOn){
          var n=pickReplyCount();
          sys.push({role:'system',content:'当前线上即时聊天。严格回复'+n+'条，每条用<msg>...</msg>包裹，贴合人设自然聊天。'});
          var out=await callChat(sys.concat(M.slice(-40)));
          var arr=parseMsgs(out).slice(0,n);
          for(var i=0;i<arr.length;i++){
            H.push({role:'assistant',content:arr[i],time:now(),mode:'online'});
          }
        }else{
          sys.push({role:'system',content:'当前线上即时聊天。按人设和语境自由回复，若多条可用<msg>包裹。'});
          var out2=await callChat(sys.concat(M.slice(-40)));
          var arr2=parseMsgs(out2);
          for(var j=0;j<arr2.length;j++){
            H.push({role:'assistant',content:arr2[j],time:now(),mode:'online'});
          }
        }
      }else{
        sys.push({role:'system',content:'当前线下沉浸模式。只输出一条完整回复，不使用<msg>，不分条，贴合人设推进。'});
        var out3=await callChat(sys.concat(M.slice(-40)));
        out3=String(out3||'').replace(/<\/?msg>/gi,'').trim();
        H.push({role:'assistant',content:out3||'我在。',time:now(),mode:'offline'});
      }

      save(HMAP_KEY,HMap); renderChat();
    }catch(e){
      H.push({role:'assistant',content:'[请求失败] '+String(e.message||e),time:now(),mode:mode});
      save(HMAP_KEY,HMap); renderChat();
    }finally{
      streaming=false; $('#sendBtn').disabled=false; setStatus();
    }
  }

  async function testConn(){
    try{
      if(!(C.url&&C.key&&C.model)){ toast('先填全配置'); return; }
      await callChat([{role:'user',content:'回1'}]);
      toast('连接正常');
    }catch(e){
      toast('连接失败');
    }
  }

  function bind(){
    $$('.tab').forEach(function(t){
      t.addEventListener('click',function(){ switchPage(t.getAttribute('data-page')); });
    });
    $('#backBtn').addEventListener('click',function(){ switchPage('home'); });
    $('#saveRoleBtn').addEventListener('click',saveRole);
    $('#resetRoleBtn').addEventListener('click',resetRoleForm);
    $('#delRoleBtn').addEventListener('click',delRole);

    $('#savePfBtn').addEventListener('click',function(){
      PF.name=($('#pfNameInp').value||'').trim()||'Noctis 用户';
      PF.sign=($('#pfSignInp').value||'').trim()||'还没写签名';
      save(PF_KEY,PF); renderProfile(); toast('资料已保存');
    });

    $('#saveCfgBtn').addEventListener('click',function(){
      C.url=norm($('#cUrl').value); C.key=($('#cKey').value||'').trim(); C.model=($('#cModel').value||'').trim();
      C.temp=parseFloat($('#cTemp').value)||0.8; C.max=parseInt($('#cMax').value,10)||800;
      C.chatMode=($('#chatMode').value==='offline')?'offline':'online';
      C.multiOn=!!$('#multiOn').checked;
      C.multiMin=parseInt($('#multiMin').value,10)||2;
      C.multiMax=parseInt($('#multiMax').value,10)||3;
      save(CFG_KEY,C); setStatus(); toast('配置已保存');
    });

    $('#testBtn').addEventListener('click',testConn);

    $('#sendBtn').addEventListener('click',requestReply);
    $('#inp').addEventListener('input',function(){
      this.style.height='42px';
      this.style.height=Math.min(this.scrollHeight,120)+'px';
    });
    $('#inp').addEventListener('keydown',function(e){
      if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){ e.preventDefault(); requestReply(); }
    });

    $('#chatMode').addEventListener('change',function(){ syncModeNow(); });
  }

  function init(){
    C=load(CFG_KEY,C); roles=load(ROLE_KEY,[]); activeRoleId=load(ACT_KEY,''); HMap=load(HMAP_KEY,{}); PF=load(PF_KEY,PF);
    if(!roles.length){
      var id=uid();
      roles=[{id:id,name:'默认助手',avatar:'AI',greeting:'先去角色页设置人设。',prompt:''}];
      activeRoleId=id;
      save(ROLE_KEY,roles); save(ACT_KEY,activeRoleId);
    }
    if(!activeRoleId&&roles.length) activeRoleId=roles[0].id;

    $('#cUrl').value=C.url||''; $('#cKey').value=C.key||''; $('#cModel').value=C.model||'';
    $('#cTemp').value=C.temp||0.8; $('#cMax').value=C.max||800;
    $('#chatMode').value=C.chatMode||'online';
    $('#multiOn').checked=!!C.multiOn;
    $('#multiMin').value=C.multiMin||2; $('#multiMax').value=C.multiMax||3;

    bind();
    renderProfile();
    renderHomeApps();
    renderRoles();
    renderChat();
    renderClock();
    setInterval(renderClock,15000);
    setStatus();
    switchPage('home');
  }

  init();
})();
</script>
</body>
</html>
