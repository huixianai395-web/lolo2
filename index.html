

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>小手机 保命版</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    #app{max-width:430px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:#111}
    .screen{position:absolute;inset:0;display:none;background:#f7f7fb}
    .screen.active{display:block}
    .header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#fff;border-bottom:1px solid #e9e9ef}
    .btn{border:none;border-radius:10px;padding:8px 12px;font-size:13px;background:#edf2ff;color:#173a7a;cursor:pointer}
    .btn.p{background:#2f66d8;color:#fff}
    .page{height:calc(100% - 52px);overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .card{background:#fff;border:1px solid #ececf2;border-radius:14px;padding:12px}
    .small{font-size:12px;color:#777}
    .input,.ta{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;background:#fff;font-size:14px}
    .ta{min-height:42px;max-height:120px;resize:none}

    /* home */
    #home{color:#fff}
    .wall{position:absolute;inset:0;background:
      linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)),
      url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
      z-index:0}
    .home-layer{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:18px 12px 14px}
    .date{font-size:15px;opacity:.95}
    .time{font-size:72px;font-weight:760;letter-spacing:-2px;text-shadow:0 2px 12px rgba(0,0,0,.2)}
    .grid{margin-top:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px}
    .icon{text-align:center}
    .icon-box{width:62px;height:62px;margin:0 auto 6px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.45);font-size:27px;cursor:pointer}
    .label{font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.25)}

    /* list */
    .list{display:flex;flex-direction:column;gap:8px}
    .item{background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;display:flex;gap:10px;align-items:center;cursor:pointer}
    .avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#eef2ff}
    .main{flex:1;min-width:0}
    .name{font-weight:600;color:#222}
    .preview{margin-top:4px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t{font-size:11px;color:#999}

    /* chat */
    #chatMsgs{height:calc(100% - 52px - 62px);overflow:auto;padding:12px;background:#eef1f6;display:flex;flex-direction:column;gap:10px}
    .bubble{max-width:78%;padding:10px 12px;border-radius:14px;line-height:1.45;word-break:break-word;white-space:pre-wrap}
    .me{margin-left:auto;background:#2f66d8;color:#fff;border-bottom-right-radius:6px}
    .ai{background:#fff;border:1px solid #e8e8ef;border-bottom-left-radius:6px}
    .chatInputBar{position:absolute;left:0;right:0;bottom:0;padding:10px;background:#fff;border-top:1px solid #e9e9ef;display:flex;gap:8px}
    #chatInput{flex:1}
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <section id="home" class="screen active">
    <div class="wall"></div>
    <div class="home-layer">
      <div class="date" id="homeDate"></div>
      <div class="time" id="homeTime"></div>

      <div class="grid">
        <div class="icon" onclick="show('wechat')"><div class="icon-box">💬</div><div class="label">微信</div></div>
        <div class="icon" onclick="show('api')"><div class="icon-box">🔑</div><div class="label">API</div></div>
      </div>
    </div>
  </section>

  <!-- WeChat -->
  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" onclick="show('home')">‹ 返回</button>
      <b>微信</b>
      <button class="btn" onclick="addContact()">+联系人</button>
    </div>
    <div class="page" style="padding:0;">
      <div style="padding:10px 12px;border-bottom:1px solid #eee;background:#fff;">
        <input id="searchInput" class="input" placeholder="搜索联系人" oninput="renderContacts(this.value)" />
      </div>
      <div id="contactList" class="list" style="padding:10px;"></div>
    </div>
  </section>

  <!-- Chat -->
  <section id="chatRoom" class="screen">
    <div class="header">
      <button class="btn" onclick="show('wechat')">‹ 返回</button>
      <b id="chatTitle">聊天</b>
      <button class="btn" onclick="clearChat()">清空</button>
    </div>
    <div id="chatMsgs"></div>
    <div class="chatInputBar">
      <textarea id="chatInput" class="ta" placeholder="输入消息..."></textarea>
      <button class="btn p" onclick="sendMsg()">发送</button>
    </div>
  </section>

  <!-- API -->
  <section id="api" class="screen">
    <div class="header">
      <button class="btn" onclick="show('home')">‹ 返回</button>
      <b>API 设置</b>
      <button class="btn p" onclick="saveApi()">保存</button>
    </div>
    <div class="page">
      <div class="card">
        <div class="small">Base URL（支持反代）</div>
        <input id="apiBase" class="input" placeholder="https://api.cetaceang.qzz.io" />
      </div>
      <div class="card">
        <div class="small">API Key</div>
        <input id="apiKey" class="input" type="password" placeholder="sk-..." />
      </div>
      <div class="card">
        <div class="small">Model</div>
        <input id="apiModel" class="input" value="gpt-4o-mini" />
      </div>
      <div class="card">
        <div class="small">Temperature</div>
        <input id="apiTemp" class="input" type="number" min="0" max="2" step="0.1" value="0.8" />
      </div>
      <div class="card">
        <button class="btn" onclick="testApi()">测试连接</button>
        <div id="apiStatus" class="small" style="margin-top:8px;">状态：未测试</div>
      </div>
    </div>
  </section>

</div>

<script>
const K_API='mp_api_cfg_min';
const K_CONTACTS='mp_contacts_min';
const K_CHATS='mp_chats_min';
let currentContactId=null;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));}
function getJSON(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));}catch{return d;}}
function setJSON(k,v){localStorage.setItem(k,JSON.stringify(v));}

// time
function tick(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const w=['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
  document.getElementById('homeDate').textContent=`${n.getMonth()+1}月${n.getDate()}日 ${w}`;
  document.getElementById('homeTime').textContent=`${h}:${m}`;
}
setInterval(tick,1000); tick();

// contacts
function getContacts(){
  let arr=getJSON(K_CONTACTS,null);
  if(!arr){
    arr=[{
      id:'c_'+Date.now(),
      name:'沈昼白',
      avatar:'https://i.postimg.cc/y8xWzCqj/anime-boy.jpg',
      preview:'在吗 我刚遛狗回来',
      time:'刚刚',
      unread:1,
      persona:'计算机系大三，爱分享日常'
    }];
    setJSON(K_CONTACTS,arr);
  }
  return arr;
}
function setContacts(arr){setJSON(K_CONTACTS,arr);}

function renderContacts(keyword=''){
  const k=(keyword||'').trim();
  const arr=getContacts().filter(c=>!k||c.name.includes(k)||(c.preview||'').includes(k));
  const box=document.getElementById('contactList');
  box.innerHTML=arr.map(c=>`
    <div class="item" onclick="openChat('${c.id}')">
      <img class="avatar" src="${c.avatar||'https://via.placeholder.com/88x88?text=头像'}"/>
      <div class="main">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="name">${esc(c.name)}</div>
          <div class="t">${esc(c.time||'')}</div>
        </div>
        <div class="preview">${esc(c.preview||'')}</div>
      </div>
      ${c.unread?`<div style="background:#ff4d4f;color:#fff;border-radius:999px;padding:2px 6px;font-size:11px">${c.unread}</div>`:''}
    </div>
  `).join('') || `<div class="card small">暂无联系人</div>`;
}

function addContact(){
  const name=(prompt('联系人昵称：')||'').trim();
  if(!name) return;
  const avatar=(prompt('头像URL（可空）：')||'').trim();
  const persona=(prompt('人设（可空）：')||'').trim();
  const arr=getContacts();
  arr.unshift({
    id:'c_'+Date.now()+'_'+Math.floor(Math.random()*9999),
    name, avatar, persona,
    preview:'新的聊天已创建',
    time:'刚刚',
    unread:0
  });
  try{
    setContacts(arr);
    renderContacts();
  }catch{
    alert('保存失败：本地存储空间不足');
  }
}

// chat
function getChats(){return getJSON(K_CHATS,{});}
function setChats(m){setJSON(K_CHATS,m);}

function openChat(id){
  currentContactId=id;
  const c=getContacts().find(x=>x.id===id);
  document.getElementById('chatTitle').textContent=c?c.name:'聊天';
  renderChat();
  show('chatRoom');
}
window.openChat=openChat;

function renderChat(){
  const map=getChats();
  const msgs=map[currentContactId]||[];
  const box=document.getElementById('chatMsgs');
  box.innerHTML=msgs.map(m=>`<div class="bubble ${m.role==='user'?'me':'ai'}">${esc(m.text)}</div>`).join('');
  box.scrollTop=box.scrollHeight;
}
function clearChat(){
  if(!currentContactId) return;
  if(!confirm('清空当前聊天？')) return;
  const map=getChats();
  map[currentContactId]=[];
  setChats(map);
  renderChat();
}

// api
function loadApi(){
  const cfg=getJSON(K_API,{base:'',key:'',model:'gpt-4o-mini',temp:0.8});
  document.getElementById('apiBase').value=cfg.base||'';
  document.getElementById('apiKey').value=cfg.key||'';
  document.getElementById('apiModel').value=cfg.model||'gpt-4o-mini';
  document.getElementById('apiTemp').value=cfg.temp??0.8;
}
function saveApi(){
  const cfg={
    base:(document.getElementById('apiBase').value||'').trim(),
    key:(document.getElementById('apiKey').value||'').trim(),
    model:(document.getElementById('apiModel').value||'').trim()||'gpt-4o-mini',
    temp:Number(document.getElementById('apiTemp').value||0.8)
  };
  setJSON(K_API,cfg);
  document.getElementById('apiStatus').textContent='状态：已保存';
  return cfg;
}
function chatUrl(base){
  const b=(base||'').replace(/\/+$/,'');
  if(b.endsWith('/v1')) return b+'/chat/completions';
  return b+'/v1/chat/completions';
}
async function callApi(messages){
  const cfg=saveApi();
  if(!cfg.base||!cfg.key) throw new Error('请先配置 Base URL 和 API Key');
  const url=chatUrl(cfg.base);
  const r=await fetch(url,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+cfg.key
    },
    body:JSON.stringify({
      model:cfg.model,
      temperature:cfg.temp,
      messages
    })
  });
  const data=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data?.error?.message || ('HTTP '+r.status));
  return data?.choices?.[0]?.message?.content?.trim() || '';
}
async function testApi(){
  try{
    document.getElementById('apiStatus').textContent='状态：测试中...';
    const out=await callApi([{role:'user',content:'只回复 ok'}]);
    document.getElementById('apiStatus').textContent='状态：连接成功 -> '+(out||'ok');
  }catch(e){
    document.getElementById('apiStatus').textContent='状态：失败 -> '+e.message;
  }
}
window.testApi=testApi;

// send
async function sendMsg(){
  const input=document.getElementById('chatInput');
  const t=(input.value||'').trim();
  if(!t||!currentContactId) return;

  const map=getChats();
  map[currentContactId]=map[currentContactId]||[];
  map[currentContactId].push({role:'user',text:t,time:Date.now()});
  setChats(map);
  input.value='';
  renderChat();

  map[currentContactId].push({role:'assistant',text:'...',time:Date.now()});
  setChats(map);
  renderChat();

  try{
    const c=getContacts().find(x=>x.id===currentContactId);
    const hist=(map[currentContactId]||[]).filter(m=>m.text!=='...').slice(-20);
    const messages=[
      {role:'system',content:`你是${c?.name||'聊天对象'}，人设：${c?.persona||'自然聊天'}。回复自然简短。`},
      ...hist.map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}))
    ];
    const out=await callApi(messages);

    const arr=map[currentContactId];
    if(arr.length&&arr[arr.length-1].text==='...') arr.pop();
    arr.push({role:'assistant',text:out||'...',time:Date.now()});
    setChats(map);

    const cs=getContacts();
    const idx=cs.findIndex(x=>x.id===currentContactId);
    if(idx>=0){
      cs[idx].preview=out||'...';
      cs[idx].time='刚刚';
      setContacts(cs);
    }
    renderChat();
    renderContacts(document.getElementById('searchInput').value||'');
  }catch(e){
    const arr=map[currentContactId];
    if(arr.length&&arr[arr.length-1].text==='...') arr.pop();
    arr.push({role:'assistant',text:'请求失败：'+e.message,time:Date.now()});
    setChats(map);
    renderChat();
  }
}
window.sendMsg=sendMsg;

document.getElementById('chatInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});

// init
loadApi();
renderContacts();
})();
</script>
</body>
</html>
