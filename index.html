<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>小手机 · IndexedDB稳定版</title>
  <style>
    :root{
      --glass: rgba(255,255,255,.28);
      --glass-border: rgba(255,255,255,.46);
      --text:#fff; --line:#e9e9ef; --blue:#2f66d8;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    #phone{width:100%;max-width:430px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:#111}
    .screen{position:absolute;inset:0;display:none;background:#f7f7fb}
    .screen.active{display:block}

    #home{color:var(--text)}
    .wallpaper{
      position:absolute;inset:0;z-index:0;
      background:
        linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)),
        url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
    }
    #petals{position:absolute;inset:0;z-index:1;pointer-events:none}
    .layer{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:18px 12px 14px}
    .windchime{
      position:absolute;right:14px;top:22px;width:62px;height:150px;z-index:3;pointer-events:none;
      transform-origin:top center;animation:swing 3.2s ease-in-out infinite;
    }
    .windchime .line{position:absolute;left:30px;top:0;width:2px;height:66px;background:linear-gradient(#ffe8b5,#8b6632)}
    .windchime .ring{position:absolute;left:10px;top:62px;width:42px;height:42px;border-radius:50%;
      border:2px solid rgba(230,197,133,.95);box-shadow: inset 0 0 14px rgba(0,0,0,.22)}
    .windchime .tag{position:absolute;left:24px;top:106px;width:14px;height:32px;border-radius:8px;background:linear-gradient(180deg,#f6d89f,#c89b57)}
    @keyframes swing{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-6deg)}}

    .clock{margin-top:8px;padding:4px 4px 0;text-shadow:0 2px 12px rgba(0,0,0,.22)}
    .date{font-size:15px;opacity:.95;margin-left:2px}
    .time{font-size:72px;line-height:1.02;letter-spacing:-2px;font-weight:760;margin-top:2px}
    .widgets{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .widget{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;padding:10px 12px;backdrop-filter:blur(12px)}
    .widget .t{font-size:12px;opacity:.88}
    .widget .v{font-size:16px;font-weight:700;margin-top:4px}
    .grid{margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px;padding:0 2px}
    .icon{text-align:center}
    .icon-box{
      width:62px;height:62px;margin:0 auto 6px;border-radius:16px;display:grid;place-items:center;
      background:var(--glass);border:1px solid var(--glass-border);font-size:27px;cursor:pointer;
      transition:transform .12s ease;backdrop-filter:blur(10px)
    }
    .icon:active .icon-box{transform:scale(.88)}
    .label{font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.25)}
    .dock-wrap{margin-top:auto;padding:10px 2px 0}
    .dock{
      border-radius:26px;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
      background:rgba(255,255,255,.26);border:1px solid rgba(255,255,255,.42);backdrop-filter:blur(14px)
    }

    .header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#fff;border-bottom:1px solid var(--line)}
    .btn{border:none;border-radius:10px;padding:8px 12px;font-size:13px;background:#edf2ff;color:#173a7a;cursor:pointer}
    .btn.p{background:var(--blue);color:#fff}
    .page{height:calc(100% - 52px);overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .card{background:#fff;border:1px solid #ececf2;border-radius:14px;padding:12px}
    .small{font-size:12px;color:#777}
    .input,.ta{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fff}
    .ta{min-height:180px;resize:vertical}
    .row{display:flex;gap:8px;align-items:center}

    .wechat-list{padding:8px 10px;display:flex;flex-direction:column;gap:8px}
    .wechat-item{background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;display:flex;align-items:center;gap:10px;cursor:pointer}
    .wechat-avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#eef2ff;flex-shrink:0}
    .wechat-main{flex:1;min-width:0}
    .wechat-top{display:flex;justify-content:space-between;align-items:center}
    .wechat-name{font-weight:600;color:#222}
    .wechat-time{font-size:11px;color:#999}
    .wechat-preview{margin-top:4px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wechat-badge{min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ff4d4f;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}

    .modal-mask{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:99;display:none;place-items:center}
    .modal-card{width:88%;max-width:360px;background:#fff;border-radius:14px;padding:12px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
  </style>
</head>
<body>
<div id="phone">
  <section id="home" class="screen active">
    <div class="wallpaper" id="wallpaper"></div>
    <canvas id="petals"></canvas>
    <div class="windchime"><span class="line"></span><span class="ring"></span><span class="tag"></span></div>
    <div class="layer">
      <div class="clock">
        <div class="date" id="dateText"></div>
        <div class="time" id="timeText"></div>
      </div>
      <div class="widgets">
        <div class="widget"><div class="t">纪念日</div><div class="v">第 233 天</div></div>
        <div class="widget"><div class="t">天气</div><div class="v">22°C 晴</div></div>
      </div>
      <div class="grid">
        <div class="icon" onclick="show('wechat')"><div class="icon-box">💬</div><div class="label">微信</div></div>
        <div class="icon" onclick="show('probe')"><div class="icon-box">📱</div><div class="label">查手机</div></div>
        <div class="icon" onclick="show('books')"><div class="icon-box">📚</div><div class="label">书籍工坊</div></div>
        <div class="icon" onclick="show('fanfic')"><div class="icon-box">🖋️</div><div class="label">同人文</div></div>
        <div class="icon" onclick="show('pdd')"><div class="icon-box">🛍️</div><div class="label">拼多多</div></div>
      </div>
      <div class="dock-wrap">
        <div class="dock">
          <div class="icon" onclick="show('worldbook')"><div class="icon-box">📖</div><div class="label">世界书</div></div>
          <div class="icon" onclick="show('appearance')"><div class="icon-box">🎨</div><div class="label">外观</div></div>
          <div class="icon" onclick="show('api')"><div class="icon-box">🔑</div><div class="label">API</div></div>
        </div>
      </div>
    </div>
  </section>

  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" onclick="show('home')">‹ 返回</button>
      <b>微信</b>
      <div class="row">
        <button class="btn" id="addRoleBtn" type="button">+</button>
        <button class="btn p" id="groupBtn" type="button">群聊</button>
      </div>
    </div>
    <div class="page" style="padding:0;">
      <div style="padding:10px 12px;border-bottom:1px solid #eee;background:#fff;">
        <input id="wechatSearch" class="input" placeholder="搜索联系人" />
      </div>
      <div id="wechatList" class="wechat-list"></div>
    </div>
  </section>

  <section id="probe" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>查手机</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>
  <section id="books" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>书籍工坊</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>
  <section id="fanfic" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>同人文</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>
  <section id="pdd" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>拼多多</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>
  <section id="worldbook" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>世界书</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>

  <section id="appearance" class="screen">
    <div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>外观</b><button class="btn p" id="applyWpBtn" type="button">应用</button></div>
    <div class="page">
      <div class="card"><div class="small">壁纸URL</div><input id="wpUrl" class="input" placeholder="https://..." /></div>
      <div class="card"><div class="small">本地上传</div><input id="wpFile" type="file" accept="image/*" /></div>
    </div>
  </section>

  <section id="api" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>API</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>

  <div id="roleModal" class="modal-mask">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">创建角色</h3>
      <div class="small">昵称</div>
      <input id="roleName" class="input" placeholder="例如：沈昼白" />
      <div class="small" style="margin-top:8px;">分组（可自定义）</div>
      <input id="roleGroupInput" class="input" list="roleGroupList" placeholder="例如：朋友 / 家人 / 同学 / 恋人" />
      <datalist id="roleGroupList"></datalist>

      <div class="small" style="margin-top:8px;">头像（本地上传 或 URL）</div>
      <div class="row">
        <button class="btn" id="pickAvatarBtn" type="button">上传头像</button>
        <input id="roleAvatar" class="input" placeholder="https://..." />
      </div>
      <input id="roleAvatarFile" type="file" accept="image/*" style="display:none;" />
      <img id="roleAvatarPreview" style="width:56px;height:56px;border-radius:12px;object-fit:cover;margin-top:8px;display:none;border:1px solid #eee;" />

      <div class="small" style="margin-top:8px;">人设</div>
      <textarea id="rolePersona" class="ta" placeholder="写角色性格、背景、说话方式..."></textarea>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px;">
        <button class="btn" id="cancelRoleBtn" type="button">取消</button>
        <button class="btn p" id="saveRoleBtn" type="button">保存</button>
      </div>
    </div>
  </div>

  <input type="file" id="roleImportInput" accept=".json,.png,.jpg,.jpeg,.webp,application/json,image/*" style="display:none;" />
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const WECHAT_KEY = 'wechat_contacts_idb_v1';
  const GROUP_KEY = 'wechat_groups_idb_v1';
  const DB_NAME = 'MiniPhoneDB';
  const DB_VER = 1;
  const STORE_AVATAR = 'avatars';

  let roleAvatarId = '';
  let dbPromise = null;

  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const el = $(id); if(el) el.classList.add('active');
  }
  window.show = show;

  function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]))}

  // ===== IndexedDB =====
  function openDB(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise((resolve,reject)=>{
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = () => {
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE_AVATAR)){
          db.createObjectStore(STORE_AVATAR, { keyPath:'id' });
        }
      };
      req.onsuccess = ()=> resolve(req.result);
      req.onerror = ()=> reject(req.error);
    });
    return dbPromise;
  }

  async function putAvatar(dataUrl){
    const db = await openDB();
    const id = 'a_' + Date.now() + '_' + Math.floor(Math.random()*999999);
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE_AVATAR,'readwrite');
      tx.objectStore(STORE_AVATAR).put({id, dataUrl, t:Date.now()});
      tx.oncomplete = ()=> resolve(id);
      tx.onerror = ()=> reject(tx.error);
    });
  }

  async function getAvatar(id){
    if(!id) return '';
    const db = await openDB();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE_AVATAR,'readonly');
      const req = tx.objectStore(STORE_AVATAR).get(id);
      req.onsuccess = ()=> resolve(req.result?.dataUrl || '');
      req.onerror = ()=> reject(req.error);
    });
  }

  async function cleanupUnusedAvatars(contacts){
    const used = new Set(contacts.map(c=>c.avatarId).filter(Boolean));
    const db = await openDB();
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_AVATAR,'readwrite');
      const store = tx.objectStore(STORE_AVATAR);
      const req = store.openCursor();
      req.onsuccess = e => {
        const cursor = e.target.result;
        if(!cursor) return;
        const id = cursor.value?.id;
        if(id && !used.has(id)) store.delete(id);
        cursor.continue();
      };
      tx.oncomplete = ()=> resolve(true);
      tx.onerror = ()=> resolve(false);
    });
  }

  // ===== 时钟/飘花 =====
  function tick(){
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    const w = ['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
    $('timeText').textContent = `${h}:${m}`;
    $('dateText').textContent = `${n.getMonth()+1}月${n.getDate()}日 ${w}`;
  }

  function initPetals(){
    const c = $('petals'), ctx = c.getContext('2d');
    let ps=[];
    function resize(){
      const box = $('phone');
      c.width = box.clientWidth; c.height = box.clientHeight;
      ps = Array.from({length:36},()=>({
        x:Math.random()*c.width,y:Math.random()*c.height,
        rx:Math.random()*2.2+1, ry:Math.random()*1.6+0.8,
        vx:(Math.random()-.5)*0.35, vy:Math.random()*0.55+0.2,
        a:Math.random()*0.45+0.15
      }));
    }
    function draw(){
      ctx.clearRect(0,0,c.width,c.height);
      ps.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.y>c.height+10){p.y=-10; p.x=Math.random()*c.width;}
        if(p.x<-10)p.x=c.width+10;
        if(p.x>c.width+10)p.x=-10;
        ctx.beginPath(); ctx.ellipse(p.x,p.y,p.rx,p.ry,0,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,214,214,${p.a})`; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize(); draw(); window.addEventListener('resize', resize);
  }

  // ===== 壁纸 =====
  function initWallpaper(){
    const saved = localStorage.getItem('wp_idb_v1');
    if(saved){
      $('wallpaper').style.background = `linear-gradient(160deg, rgba(40,96,255,.28), rgba(125,221,255,.14)), url('${saved}') center/cover no-repeat`;
    }
    $('applyWpBtn').onclick = ()=>{
      const url = ($('wpUrl').value||'').trim();
      if(!url) return alert('先填壁纸URL');
      $('wallpaper').style.background = `linear-gradient(160deg, rgba(40,96,255,.28), rgba(125,221,255,.14)), url('${url}') center/cover no-repeat`;
      localStorage.setItem('wp_idb_v1', url);
      alert('壁纸已应用');
    };
    $('wpFile').onchange = e=>{
      const f=e.target.files?.[0]; if(!f) return;
      const fr = new FileReader();
      fr.onload = ()=>{
        const data = fr.result;
        $('wallpaper').style.background = `linear-gradient(160deg, rgba(40,96,255,.28), rgba(125,221,255,.14)), url('${data}') center/cover no-repeat`;
        localStorage.setItem('wp_idb_v1', data);
        alert('本地壁纸已应用');
      };
      fr.readAsDataURL(f);
      e.target.value='';
    };
  }

  // ===== contacts/group =====
  function getContacts(){
    const raw = localStorage.getItem(WECHAT_KEY);
    if(raw){ try{return JSON.parse(raw);}catch(e){} }
    const seed=[{
      id:'c_'+Date.now(),
      name:'沈昼白',
      group:'朋友',
      avatarUrl:'https://i.postimg.cc/y8xWzCqj/anime-boy.jpg',
      avatarId:'',
      persona:'计算机系大三，爱分享日常',
      preview:'在吗 我刚遛狗回来',
      time:'刚刚',
      unread:2
    }];
    localStorage.setItem(WECHAT_KEY, JSON.stringify(seed));
    return seed;
  }
  function setContacts(arr){ localStorage.setItem(WECHAT_KEY, JSON.stringify(arr)); }

  function getGroups(){
    const raw = localStorage.getItem(GROUP_KEY);
    if(raw){ try{return JSON.parse(raw);}catch(e){} }
    const init=['朋友','家人','同学','同事'];
    localStorage.setItem(GROUP_KEY, JSON.stringify(init));
    return init;
  }
  function saveGroups(arr){ localStorage.setItem(GROUP_KEY, JSON.stringify([...new Set(arr.map(s=>String(s).trim()).filter(Boolean))])); }
  function addGroup(g){ const v=String(g||'').trim(); if(!v) return; const gs=getGroups(); if(!gs.includes(v)){gs.push(v); saveGroups(gs);} }

  function renderGroupOptions(){
    $('roleGroupList').innerHTML = getGroups().map(g=>`<option value="${esc(g)}"></option>`).join('');
  }

  async function resolveAvatar(c){
    if(c.avatarUrl) return c.avatarUrl;
    if(c.avatarId){
      try{ return await getAvatar(c.avatarId); }catch(e){ return ''; }
    }
    return '';
  }

  async function renderList(keyword=''){
    const k = String(keyword||'').trim();
    const arr = getContacts().filter(c=> !k || (c.name||'').includes(k) || (c.group||'').includes(k) || (c.preview||'').includes(k));

    $('wechatList').innerHTML = arr.map(c=>`
      <div class="wechat-item" data-id="${c.id}">
        <img class="wechat-avatar" data-aid="${c.id}" src="https://via.placeholder.com/88x88?text=头像" />
        <div class="wechat-main">
          <div class="wechat-top">
            <div class="wechat-name">${esc(c.name)}</div>
            <div class="wechat-time">${esc(c.time||'')}</div>
          </div>
          <div class="wechat-preview">${esc(c.preview||'点击进入聊天')}</div>
        </div>
        ${c.unread ? `<div class="wechat-badge">${c.unread}</div>` : ''}
      </div>
    `).join('') || `<div class="card small">暂无联系人，点右上角 + 创建或导入。</div>`;

    // 异步填充头像
    for(const c of arr){
      const img = document.querySelector(`img[data-aid="${c.id}"]`);
      if(!img) continue;
      const src = await resolveAvatar(c);
      if(src) img.src = src;
    }

    document.querySelectorAll('.wechat-item').forEach(item=>{
      item.onclick=()=>{
        const id=item.dataset.id;
        const c=getContacts().find(x=>x.id===id);
        alert(`下一步接入真实聊天页：${c?.name||''}`);
      };
    });
  }

  // ===== image helpers =====
  function readText(file){
    return new Promise((resolve,reject)=>{
      const fr = new FileReader();
      fr.onload=()=>resolve(fr.result);
      fr.onerror=reject;
      fr.readAsText(file,'utf-8');
    });
  }

  function compressImageToDataURL(file, maxSide=320, quality=0.55){
    return new Promise((resolve,reject)=>{
      const fr = new FileReader();
      fr.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          let w=img.width,h=img.height;
          const scale=Math.min(1,maxSide/Math.max(w,h));
          w=Math.round(w*scale); h=Math.round(h*scale);
          const c=document.createElement('canvas'); c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          let out='';
          try{ out=c.toDataURL('image/webp',quality); }catch(e){}
          if(!out || out.startsWith('data:,')) out=c.toDataURL('image/jpeg',quality);
          resolve(out);
        };
        img.onerror=reject;
        img.src=fr.result;
      };
      fr.onerror=reject;
      fr.readAsDataURL(file);
    });
  }

  function normalizeRoleObj(x){
    if(!x || typeof x!=='object') return null;
    const d = (x.data && typeof x.data==='object') ? x.data : x;
    const name = (d.name || x.name || d.char_name || x.char_name || d.character_name || x.character_name || '').trim?.() || '';
    if(!name) return null;

    const personaParts = [
      d.persona, x.persona, d.description, x.description,
      d.personality, x.personality, d.scenario, x.scenario,
      d.system_prompt, x.system_prompt, d.prompt, x.prompt, d.first_mes, x.first_mes
    ].filter(Boolean).map(s=>String(s).trim());

    return {
      name,
      group: d.group || x.group || d.category || x.category || '朋友',
      avatarUrl: d.avatar || x.avatar || d.avatar_url || x.avatar_url || '',
      persona: personaParts.join('\n\n'),
      preview: d.preview || x.preview || '已导入角色',
      unread: Number(d.unread || x.unread || 0)
    };
  }

  async function extractRoleFromPng(file){
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);
    const sig=[137,80,78,71,13,10,26,10];
    for(let i=0;i<8;i++) if(bytes[i]!==sig[i]) return null;

    const td = new TextDecoder();
    let off=8;
    while(off+12<=bytes.length){
      const len=(bytes[off]<<24)|(bytes[off+1]<<16)|(bytes[off+2]<<8)|bytes[off+3];
      const type=td.decode(bytes.slice(off+4,off+8));
      const dataStart=off+8, dataEnd=dataStart+len;
      if(dataEnd+4>bytes.length) break;

      if(type==='tEXt'){
        const chunk=bytes.slice(dataStart,dataEnd);
        const zero=chunk.indexOf(0);
        if(zero>0){
          const key=td.decode(chunk.slice(0,zero));
          const val=td.decode(chunk.slice(zero+1));
          if(key.toLowerCase()==='chara'){
            try{
              const json = JSON.parse(atob(val));
              return normalizeRoleObj(json);
            }catch(e){}
          }
        }
      }
      off=dataEnd+4;
    }
    return null;
  }

  // ===== modal / create =====
  function openRoleModal(){ $('roleModal').style.display='grid'; renderGroupOptions(); }
  function closeRoleModal(){ $('roleModal').style.display='none'; }

  async function saveRole(){
    const name=($('roleName').value||'').trim();
    const group=($('roleGroupInput').value||'').trim() || '未分组';
    const avatarUrl=($('roleAvatar').value||'').trim();
    const persona=($('rolePersona').value||'').trim();
    if(!name) return alert('昵称不能为空');

    addGroup(group);

    const arr = getContacts();
    arr.unshift({
      id:'c_'+Date.now()+'_'+Math.floor(Math.random()*9999),
      name, group,
      avatarUrl: avatarUrl || '',
      avatarId: roleAvatarId || '',
      persona,
      preview:'新的聊天已创建',
      time:'刚刚',
      unread:0
    });

    try{ setContacts(arr); }catch(e){ return alert('保存失败：存储异常'); }

    $('roleName').value=''; $('roleGroupInput').value=''; $('roleAvatar').value=''; $('rolePersona').value='';
    roleAvatarId=''; $('roleAvatarPreview').style.display='none'; $('roleAvatarPreview').src='';
    closeRoleModal();
    await renderList();
    alert('角色已保存');
  }

  // ===== import =====
  async function importRoleFile(file){
    const lower=(file.name||'').toLowerCase();
    const isJson=file.type==='application/json' || lower.endsWith('.json');
    const isImage=file.type.startsWith('image/') || /\.(png|jpg|jpeg|webp)$/i.test(lower);

    if(isJson){
      let text = await readText(file);
      text = text.replace(/^\uFEFF/,'');
      let data;
      try{ data=JSON.parse(text); }catch{ throw new Error('JSON格式错误'); }

      const list = Array.isArray(data)?data:[data];
      const arr = getContacts();
      let ok=0;

      for(const it of list){
        const n = normalizeRoleObj(it);
        if(!n) continue;
        addGroup(n.group);
        arr.unshift({
          id:'c_'+Date.now()+'_'+Math.floor(Math.random()*9999),
          name:n.name,
          group:n.group,
          avatarUrl:n.avatarUrl || '',
          avatarId:'',
          persona:n.persona || '',
          preview:n.preview || '已从JSON导入',
          time:'刚刚',
          unread:n.unread || 0
        });
        ok++;
      }

      if(!ok) throw new Error('JSON里没有可识别角色（至少需要 name）');
      setContacts(arr);
      await renderList();
      alert('JSON导入成功：'+ok+'个角色');
      return;
    }

    if(isImage){
      // 尝试PNG角色卡元数据
      let parsed = null;
      if(/\.png$/i.test(lower) || file.type==='image/png'){
        parsed = await extractRoleFromPng(file);
      }

      const avatarData = await compressImageToDataURL(file, 320, 0.55);
      const avatarId = await putAvatar(avatarData);

      const arr = getContacts();

      if(parsed && parsed.name){
        addGroup(parsed.group || '朋友');
        arr.unshift({
          id:'c_'+Date.now()+'_'+Math.floor(Math.random()*9999),
          name:parsed.name,
          group:parsed.group || '朋友',
          avatarUrl: parsed.avatarUrl || '',
          avatarId,
          persona:parsed.persona || '',
          preview:'已从PNG角色卡导入',
          time:'刚刚',
          unread: parsed.unread || 0
        });
        setContacts(arr);
        await renderList();
        alert('PNG角色卡导入成功');
        return;
      }

      // fallback 快速导入
      const baseName=file.name.replace(/\.[^.]+$/,'');
      const name=(prompt('输入角色名：',baseName)||'').trim();
      if(!name) throw new Error('已取消导入');
      const group=(prompt('输入分组（可自定义）：','朋友')||'朋友').trim() || '朋友';
      const persona=(prompt('可选：输入角色人设：','')||'').trim();
      addGroup(group);

      arr.unshift({
        id:'c_'+Date.now()+'_'+Math.floor(Math.random()*9999),
        name, group,
        avatarUrl:'',
        avatarId,
        persona,
        preview:'已从图片导入',
        time:'刚刚',
        unread:0
      });

      setContacts(arr);
      await renderList();
      alert('图片导入成功');
      return;
    }

    throw new Error('暂不支持该格式，请使用 JSON 或图片文件');
  }

  // ===== bind =====
  async function bind(){
    $('addRoleBtn').onclick=()=>{
      const create = confirm('点“确定”创建角色；点“取消”导入JSON/PNG/图片');
      if(create) openRoleModal();
      else $('roleImportInput').click();
    };
    $('groupBtn').onclick=()=>alert('群聊选择器下一步接入');
    $('wechatSearch').oninput=e=>renderList(e.target.value||'');

    $('cancelRoleBtn').onclick=closeRoleModal;
    $('saveRoleBtn').onclick=()=>saveRole();

    $('roleImportInput').onchange=async e=>{
      const f=e.target.files?.[0];
      if(!f) return;
      try{
        document.body.style.cursor='progress';
        await importRoleFile(f);
      }catch(err){
        alert('导入失败：'+err.message);
      }finally{
        document.body.style.cursor='';
        e.target.value='';
      }
    };

    $('pickAvatarBtn').onclick=()=> $('roleAvatarFile').click();
    $('roleAvatarFile').onchange=async e=>{
      const f=e.target.files?.[0];
      if(!f) return;
      const data = await compressImageToDataURL(f, 320, 0.55);
      roleAvatarId = await putAvatar(data);
      $('roleAvatarPreview').src = data;
      $('roleAvatarPreview').style.display='block';
      e.target.value='';
    };

    $('roleModal').onclick=e=>{ if(e.target.id==='roleModal') closeRoleModal(); };
  }

  // ===== init =====
  tick(); setInterval(tick,1000);
  initPetals();
  initWallpaper();
  await openDB();
  await bind();
  renderGroupOptions();
  await renderList();

  // 启动时顺手清一次孤儿头像
  cleanupUnusedAvatars(getContacts());
})();
</script>
</body>
