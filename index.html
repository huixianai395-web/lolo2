<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>小手机 v2.0 Ultra</title>
  <style>
    :root { --p-color: #007aff; --bg: #f2f2f7; --bubble-me: #007aff; --bubble-ai: #ffffff; }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;overflow:hidden}
    #app{max-width:430px;height:100dvh;margin:0 auto;position:relative;background:#111;padding-top:env(safe-area-inset-top)}
    .screen{position:absolute;inset:0;display:none;background:var(--bg);top:env(safe-area-inset-top);flex-direction:column}
    .screen.active{display:flex}
    
    /* Header */
    .header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border-bottom:0.5px solid #d1d1d6;z-index:10;flex-shrink:0}
    .btn{border:none;border-radius:20px;padding:6px 14px;font-size:14px;background:#e5e5ea;color:#000;cursor:pointer;font-weight:500}
    .btn.p{background:var(--p-color);color:#fff}
    .mode-tag{font-size:10px;padding:2px 8px;border-radius:10px;margin-left:4px;background:#ff9500;color:#fff;font-weight:bold;vertical-align:middle}

    [span_0](start_span)[span_1](start_span)/* Home Layout[span_0](end_span)[span_1](end_span) */
    #home{color:#fff;background:#000}
    .wall{position:absolute;inset:0;background:linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)), url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;z-index:0}
    .home-layer{position:relative;z-index:2;height:100%;padding:20px 16px;display:flex;flex-direction:column}
    .time{font-size:72px;font-weight:700;letter-spacing:-2px;margin-top:20px}
    .widgets{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
    .widget{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);border-radius:20px;padding:15px;border:0.5px solid rgba(255,255,255,0.3)}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:40px}
    .ibox{width:60px;height:60px;background:rgba(255,255,255,0.25);border-radius:15px;display:grid;place-items:center;font-size:30px;margin:0 auto 5px;border:0.5px solid rgba(255,255,255,0.4)}

    /* Chat Area */
    #chatMsgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:#f2f2f7}
    .msg-row{display:flex;gap:10px;max-width:88%;margin-bottom:4px}
    .msg-row.me{align-self:flex-end;flex-direction:row-reverse}
    
    [span_2](start_span)/* Online Style[span_2](end_span) */
    .online .bubble{padding:10px 14px;font-size:15px;line-height:1.45;word-break:break-word;position:relative}
    .online .bubble.ai{background:var(--bubble-ai);border-radius:18px 18px 18px 4px;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
    .online .bubble.me{background:var(--bubble-me);color:#fff;border-radius:18px 18px 4px 18px}
    .online .chat-avatar{width:36px;height:36px;border-radius:10px;object-fit:cover;align-self:flex-end}

    /* Offline/Tavern Style */
    .offline #chatMsgs{background:#1a1a1a;gap:20px}
    .offline .msg-row{max-width:100%;flex-direction:column;align-items:center;align-self:center}
    .offline .chat-avatar{width:90px;height:90px;border-radius:50%;border:3px solid #333;margin-bottom:12px;box-shadow:0 8px 20px rgba(0,0,0,0.5)}
    .offline .bubble{width:92%;background:#2c2c2e;color:#eee;padding:20px;border-radius:16px;font-size:16px;line-height:1.7;border:0.5px solid #3a3a3c}
    .offline .me .chat-avatar{display:none}
    .offline .me .bubble{background:transparent;border:none;color:#8e8e93;text-align:center;font-style:italic}

    [span_3](start_span)/* Input[span_3](end_span) */
    .chatInputBar{padding:10px 16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);display:flex;gap:10px;align-items:flex-end;border-top:0.5px solid #d1d1d6;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
    .ta{flex:1;border:1px solid #d1d1d6;border-radius:20px;padding:10px 15px;max-height:120px;font-size:16px;outline:none;background:#fff;resize:none;min-height:40px}

    [span_4](start_span)/* Settings & Cards[span_4](end_span) */
    .page{flex:1;overflow-y:auto;padding:16px}
    .card{background:#fff;border-radius:16px;padding:15px;margin-bottom:12px;border:0.5px solid #e5e5ea}
    .input{width:100%;padding:12px;border:1px solid #d1d1d6;border-radius:10px;margin-top:8px;font-size:15px}
    .modal-mask{position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:none;place-items:center;padding:20px}
    .modal-card{width:100%;background:#fff;border-radius:24px;padding:20px;max-height:80dvh;overflow-y:auto}
  </style>
</head>
<body>
<div id="app">
  <section id="home" class="screen active">
    <div class="wall"></div>
    <div class="home-layer">
      <div id="homeDate" style="font-size:18px"></div>
      <div id="homeTime" class="time"></div>
      <div class="widgets">
        <div class="widget"><div style="opacity:0.7">纪念日</div><div style="font-size:18px;font-weight:bold">第 233 天</div></div>
        <div class="widget"><div style="opacity:0.7">天气</div><div style="font-size:18px;font-weight:bold">22°C 晴</div></div>
      </div>
      <div class="grid">
        <div onclick="show('wechat')"><div class="ibox">💬</div><div style="text-align:center">微信</div></div>
        <div onclick="show('api')"><div class="ibox">🔑</div><div style="text-align:center">设置</div></div>
      </div>
    </div>
  </section>

  <section id="wechat" class="screen">
    <div class="header"><button class="btn" onclick="show('home')">返回</button><b>消息</b><button class="btn p" id="addContactBtn">添加</button></div>
    <div class="page" id="contactList"></div>
  </section>

  <section id="chatRoom" class="screen">
    <div class="header">
      <button class="btn" onclick="show('wechat')">返回</button>
      <div style="text-align:center"><b id="chatTitle">聊天</b><span id="modeStatus" class="mode-tag">线上</span></div>
      <button class="btn" id="toggleModeBtn">切换</button>
    </div>
    <div id="chatMsgs" class="online"></div>
    <div class="chatInputBar">
      <textarea id="chatInput" class="ta" placeholder="发消息..." rows="1"></textarea>
      <button class="btn p" id="sendBtn">发送</button>
    </div>
  </section>

  <section id="api" class="screen">
    <div class="header"><button class="btn" onclick="show('home')">返回</button><b>API 设置</b><button class="btn p" id="saveApiBtn">保存</button></div>
    <div class="page">
      <div class="card"><span>Base URL</span><input id="apiBase" class="input" placeholder="https://api..." /></div>
      <div class="card"><span>API Key</span><input id="apiKey" class="input" type="password" placeholder="sk-..." /></div>
      <div class="card"><span>模型</span><input id="apiModel" class="input" placeholder="gpt-4o-mini" /></div>
    </div>
  </section>

  <div id="contactModal" class="modal-mask">
    <div class="modal-card">
      <h3>创建角色</h3>
      <input id="newName" class="input" placeholder="昵称" />
      <textarea id="newPersona" class="ta" style="height:150px;margin-top:10px" placeholder="输入灵魂人设..."></textarea>
      <button class="btn" style="margin-top:10px" onclick="$('newFile').click()">上传头像</button>
      <input type="file" id="newFile" hidden accept="image/*" />
      <div style="margin-top:20px;display:flex;gap:10px">
        <button class="btn p" id="saveNewContact">保存</button>
        <button class="btn" onclick="$('contactModal').style.display='none'">取消</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const getJ = (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d));
  const setJ = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  let currentId = null;
  let chatMode = 'online';
  let tempAvatar = '';

  const PROMPTS = {
    online: (name, persona) => `你是${name}。人设：${persona}。回复活泼口语化，严禁AI腔，多用*动作*。长回复请用"\\n\\n"拆分。`,
    offline: (name, persona) => `你是${name}。人设：${persona}。沉浸式演绎模式：重点描写环境、内心、神态。输出一段极高质量的长文。`
  };

  window.show = id => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); $(id).classList.add('active'); };

  [span_5](start_span)// 头像高压缩[span_5](end_span)
  $('newFile').onchange = (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (re) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = 150; c.height = 150;
        c.getContext('2d').drawImage(img, 0, 0, 150, 150);
        tempAvatar = c.toDataURL('image/webp', 0.6);
      };
      img.src = re.target.result;
    };
    reader.readAsDataURL(file);
  };

  async function sendMsg() {
    const text = $('chatInput').value.trim();
    if (!text || !currentId) return;

    const chats = getJ('mini_chats_v2', {});
    chats[currentId] = chats[currentId] || [];
    chats[currentId].push({ role: 'user', text });
    $('chatInput').value = '';
    renderChat();

    const contact = getJ('mini_contacts_v2', []).find(c => c.id === currentId);
    const api = getJ('mini_api_v11', {base:'', key:'', model:'gpt-4o-mini'});

    try {
      const res = await fetch(`${api.base.replace(/\/+$/, '')}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${api.key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: api.model,
          messages: [
            { role: 'system', content: PROMPTS[chatMode](contact.name, contact.persona) },
            ...chats[currentId].slice(-10).map(m => ({ role: m.role==='user'?'user':'assistant', content: m.text }))
          ]
        })
      });
      const data = await res.json();
      const reply = data.choices[0].message.content;

      if (chatMode === 'online') {
        reply.split(/\n\n+/).filter(s => s.trim()).forEach(s => chats[currentId].push({ role: 'assistant', text: s }));
      } else {
        chats[currentId].push({ role: 'assistant', text: reply });
      }
      setJ('mini_chats_v2', chats);
      renderChat();
    } catch(e) { alert('API错误'); }
  }

  function renderChat() {
    const chats = getJ('mini_chats_v2', {})[currentId] || [];
    const contact = getJ('mini_contacts_v2', []).find(c => c.id === currentId);
    $('chatMsgs').className = chatMode;
    $('chatMsgs').innerHTML = chats.map(m => `
      <div class="msg-row ${m.role === 'user' ? 'me' : ''}">
        <img class="chat-avatar" src="${m.role==='user' ? '' : contact.avatar}" style="${m.role==='user'?'display:none':''}" />
        <div class="bubble ${m.role === 'user' ? 'me' : 'ai'}">${m.text}</div>
      </div>
    `).join('');
    $('chatMsgs').scrollTop = $('chatMsgs').scrollHeight;
  }

  $('toggleModeBtn').onclick = () => {
    chatMode = chatMode === 'online' ? 'offline' : 'online';
    $('modeStatus').textContent = chatMode === 'online' ? '线上' : '剧情';
    $('modeStatus').style.background = chatMode === 'online' ? '#ff9500' : '#5856d6';
    renderChat();
  };

  $('addContactBtn').onclick = () => $('contactModal').style.display = 'grid';
  $('saveNewContact').onclick = () => {
    const list = getJ('mini_contacts_v2', []);
    list.unshift({ id: Date.now(), name: $('newName').value, persona: $('newPersona').value, avatar: tempAvatar });
    setJ('mini_contacts_v2', list);
    location.reload();
  };

  $('saveApiBtn').onclick = () => {
    setJ('mini_api_v11', { base: $('apiBase').value, key: $('apiKey').value, model: $('apiModel').value });
    alert('保存成功');
  };

  window.openChat = id => { currentId = id; const c = getJ('mini_contacts_v2', []).find(x=>x.id===id); $('chatTitle').textContent=c.name; show('chatRoom'); renderChat(); };
  
  $('sendBtn').onclick = sendMsg;
  $('contactList').innerHTML = getJ('mini_contacts_v2', []).map(c => `<div class="card" onclick="openChat(${c.id})"><b>${c.name}</b></div>`).join('');
  
  [span_6](start_span)// Time logic[span_6](end_span)
  setInterval(() => { const n=new Date(); $('homeTime').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0'); }, 1000);
})();
</script>
</body>
</html>
