<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>API小手机</title>
  <meta name="theme-color" content="#dbe9f5" />
  <style>
    :root{
      --bg:#dbe9f5;
      --card:#e6f0fa;
      --card-2:#d9e8f7;
      --text:#10131a;
      --muted:#5a6475;
      --line:rgba(255,255,255,.6);
      --shadow:0 10px 25px rgba(80,110,140,.18);
      --radius:24px;
      --safe-top:env(safe-area-inset-top);
      --safe-bottom:env(safe-area-inset-bottom);
      --accent:#5f8fbc;
      --accent-2:#79a8d3;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      background:#eef3f8;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      user-select:none;
      -webkit-user-select:none;
    }

    .phone{
      position:relative;
      width:100%;
      max-width:430px;
      height:100dvh;
      margin:0 auto;
      overflow:hidden;
      background:var(--bg);
    }

    .wallpaper{
      position:absolute; inset:0;
      background:linear-gradient(180deg,#d9e8f6 0%,#cfe1f1 42%,#dbe9f5 100%);
      background-size:cover;
      background-position:center;
      z-index:0;
    }

    #snow{
      position:absolute; inset:0; z-index:1; pointer-events:none;
    }

    .page{
      position:absolute; inset:0;
      z-index:2;
      opacity:0; transform:translateX(100%);
      transition:.3s ease;
      pointer-events:none;
    }
    .page.active{
      opacity:1; transform:translateX(0);
      pointer-events:auto;
    }

    .statusbar{
      padding:calc(var(--safe-top) + 8px) 16px 8px;
      display:flex; align-items:center; justify-content:space-between;
      font-weight:700; font-size:18px;
    }
    .status-right{display:flex; align-items:center; gap:8px}
    .icon-signal,.icon-wifi,.icon-battery{display:block}
    .icon-battery text{font-size:11px; font-weight:800; fill:#fff}

    .home-scroll{
      height:calc(100dvh - 64px - var(--safe-top));
      overflow:auto;
      padding:6px 16px calc(110px + var(--safe-bottom));
      scrollbar-width:none;
    }
    .home-scroll::-webkit-scrollbar{display:none}

    .date-line{
      text-align:center;
      margin-top:10px;
      font-size:18px; font-weight:700; letter-spacing:.6px;
    }
    .clock-big{
      text-align:center;
      font-size:86px; line-height:1;
      margin:6px 0 18px;
      font-weight:300;
      letter-spacing:1.5px;
    }

    .widgets{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:14px;
      margin-bottom:18px;
    }

    .glass{
      border:1px solid var(--line);
      background:rgba(238,247,255,.42);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    .couple-card{
      min-height:130px;
      overflow:hidden;
      position:relative;
      padding:0;
    }
    .couple-card img{
      width:100%; height:100%; object-fit:cover; display:block;
    }

    .small-actions{
      display:grid; grid-template-columns:1fr 1fr; gap:12px;
    }

    .icon-item{
      text-align:center;
      cursor:pointer;
    }
    .icon-box{
      width:74px; height:74px;
      margin:0 auto 8px;
      display:grid; place-items:center;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.75);
      background:rgba(230,240,251,.72);
      backdrop-filter:blur(8px);
      box-shadow:0 8px 16px rgba(80,100,130,.2);
      transition:transform .12s ease, filter .2s ease;
    }
    .icon-item:active .icon-box{transform:scale(.9)}
    .icon-emoji{font-size:32px}
    .icon-title{font-size:14px; font-weight:700}

    .anniv{
      min-height:160px;
      display:grid; place-items:center;
      text-align:center;
      color:#6f7d92;
      font-weight:700;
    }

    .app-grid{
      margin-top:8px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px 10px;
    }

    .dock{
      position:absolute;
      left:16px; right:16px; bottom:calc(16px + var(--safe-bottom));
      z-index:3;
      padding:14px 16px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      border-radius:30px;
      border:1px solid rgba(255,255,255,.7);
      background:rgba(220,233,247,.82);
      box-shadow:0 12px 26px rgba(80,100,130,.22);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .fab{
      position:absolute;
      right:12px;
      bottom:calc(145px + var(--safe-bottom));
      width:60px;height:60px;border-radius:999px;
      border:0;
      background:rgba(132,169,204,.75);
      color:#fff;
      font-size:26px; font-weight:700;
      box-shadow:0 8px 18px rgba(72,102,136,.26);
      z-index:3;
      cursor:pointer;
    }

    .topbar{
      padding:calc(var(--safe-top) + 8px) 12px 10px;
      display:flex; align-items:center; gap:8px;
    }
    .back-btn, .tool-btn{
      border:0; background:rgba(225,238,252,.88);
      width:38px; height:38px; border-radius:12px;
      box-shadow:0 6px 14px rgba(80,100,130,.16);
      font-size:18px; cursor:pointer;
    }
    .bar-title{
      flex:1; text-align:center; font-weight:800; font-size:17px;
      margin-right:46px;
    }

    .chat-wrap{
      height:calc(100dvh - 62px - var(--safe-top));
      display:grid;
      grid-template-rows:1fr auto;
      padding:0 12px calc(10px + var(--safe-bottom));
      gap:10px;
    }

    .chat-list{
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:6px 2px;
      scrollbar-width:none;
    }
    .chat-list::-webkit-scrollbar{display:none}
    .msg{
      max-width:84%;
      padding:10px 12px;
      border-radius:14px;
      line-height:1.45;
      white-space:pre-wrap;
      word-break:break-word;
      border:1px solid rgba(255,255,255,.65);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      font-size:14px;
      user-select:text;
      -webkit-user-select:text;
    }
    .msg.user{
      align-self:flex-end;
      background:rgba(112,160,204,.3);
    }
    .msg.assistant{
      align-self:flex-start;
      background:rgba(233,242,252,.65);
    }
    .msg.system{
      align-self:center;
      background:rgba(230,236,246,.75);
      color:#445062;
      font-size:12px;
    }

    .composer{
      padding:8px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.75);
      background:rgba(225,238,252,.8);
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      align-items:end;
      box-shadow:0 8px 16px rgba(80,100,130,.15);
    }
    .composer textarea{
      border:1px solid rgba(170,192,215,.8);
      background:rgba(248,252,255,.88);
      border-radius:12px;
      min-height:42px; max-height:124px;
      resize:none;
      padding:10px;
      font-size:14px;
      outline:none;
    }
    .send-btn{
      border:0; border-radius:12px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#fff; font-weight:800;
      padding:11px 14px;
      cursor:pointer;
    }
    .send-btn:disabled{opacity:.55; cursor:not-allowed}

    .settings-scroll{
      height:calc(100dvh - 62px - var(--safe-top));
      overflow:auto;
      padding:0 12px calc(16px + var(--safe-bottom));
      scrollbar-width:none;
    }
    .settings-scroll::-webkit-scrollbar{display:none}

    .card{
      margin-top:10px;
      padding:12px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.75);
      background:rgba(233,244,255,.75);
      box-shadow:0 8px 18px rgba(80,100,130,.15);
    }
    .card h3{
      margin:0 0 10px;
      font-size:15px;
    }

    .field{margin-bottom:10px}
    .field label{
      display:block;
      margin-bottom:5px;
      font-size:12px;
      color:#415066;
      font-weight:700;
    }
    .input, .select{
      width:100%;
      border:1px solid rgba(165,188,212,.85);
      background:rgba(250,253,255,.95);
      border-radius:10px;
      height:40px;
      padding:0 10px;
      font-size:14px;
      outline:none;
    }
    .input:focus, .select:focus{border-color:#7ea8ce}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:8px}
    .switch{
      display:flex; align-items:center; justify-content:space-between;
      font-size:14px; font-weight:700;
      padding:8px 0;
    }
    .actions{display:flex; gap:8px; flex-wrap:wrap}
    .btn{
      border:0; border-radius:10px; padding:9px 12px;
      background:#7ea8ce; color:#fff; font-weight:700; cursor:pointer;
    }
    .btn.secondary{background:#8b97ab}
    .btn.danger{background:#d76767}
    .hint{font-size:12px; color:#607089}
  </style>
</head>
<body>
  <div class="phone">
    <div id="wallpaper" class="wallpaper"></div>
    <canvas id="snow"></canvas>

    <!-- HOME -->
    <section class="page active" id="page-home">
      <div class="statusbar">
        <div id="status-time">23:33</div>
        <div class="status-right">
          <svg class="icon-signal" width="22" height="16" viewBox="0 0 22 16" fill="none" aria-hidden="true">
            <rect x="1" y="10" width="3" height="5" rx="1" fill="#111"/>
            <rect x="6" y="8" width="3" height="7" rx="1" fill="#111"/>
            <rect x="11" y="5" width="3" height="10" rx="1" fill="#111"/>
            <rect x="16" y="2" width="3" height="13" rx="1" fill="#111"/>
          </svg>
          <svg class="icon-wifi" width="20" height="16" viewBox="0 0 20 16" fill="none" aria-hidden="true">
            <path d="M2 6.2a12 12 0 0 1 16 0" stroke="#111" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 9a8 8 0 0 1 10 0" stroke="#111" stroke-width="2" stroke-linecap="round"/>
            <path d="M8.1 11.7a4 4 0 0 1 3.8 0" stroke="#111" stroke-width="2" stroke-linecap="round"/>
            <circle cx="10" cy="14" r="1.3" fill="#111"/>
          </svg>
          <svg class="icon-battery" width="33" height="16" viewBox="0 0 33 16" aria-hidden="true">
            <rect x="1" y="1.4" width="28" height="13.2" rx="3.2" stroke="#111" stroke-width="1.6" fill="none"/>
            <rect x="30" y="5.3" width="2.2" height="5.4" rx="1" fill="#111"/>
            <rect id="battery-fill" x="3.2" y="3.6" width="18" height="8.8" rx="2.2" fill="#111"/>
          </svg>
        </div>
      </div>

      <div class="home-scroll">
        <div class="date-line" id="date-line">3月5日 星期四</div>
        <div class="clock-big" id="clock-big">23:33</div>

        <div class="widgets">
          <div class="glass couple-card" title="上传主图可在设置里修改">
            <img id="couple-img" alt="封面图" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='600' height='400'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23b8d0ea'/%3E%3Cstop offset='1' stop-color='%239fc0df'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23g)'/%3E%3Ctext x='50%25' y='52%25' fill='white' font-size='36' text-anchor='middle' font-family='Arial'%3EAPI%20Phone%3C/text%3E%3C/svg%3E">
          </div>
          <div class="small-actions">
            <div class="icon-item" data-open="chat">
              <div class="icon-box"><span class="icon-emoji">💬</span></div>
              <div class="icon-title">Chat</div>
            </div>
            <div class="icon-item">
              <div class="icon-box"><span class="icon-emoji">🌍</span></div>
              <div class="icon-title">世界书</div>
            </div>
            <div class="icon-item">
              <div class="icon-box"><span class="icon-emoji">❤️</span></div>
              <div class="icon-title">纪念日</div>
            </div>
            <div class="icon-item">
              <div class="icon-box"><span class="icon-emoji">🫧</span></div>
              <div class="icon-title">论坛</div>
            </div>
          </div>
        </div>

        <div class="app-grid">
          <div class="icon-item" data-open="chat"><div class="icon-box"><span class="icon-emoji">📨</span></div><div class="icon-title">短信</div></div>
          <div class="icon-item" data-open="settings"><div class="icon-box"><span class="icon-emoji">⚙️</span></div><div class="icon-title">设置</div></div>
          <div class="icon-item"><div class="icon-box"><span class="icon-emoji">🧠</span></div><div class="icon-title">记忆</div></div>
          <div class="icon-item"><div class="icon-box"><span class="icon-emoji">🎨</span></div><div class="icon-title">主题</div></div>
          <div class="icon-item"><div class="icon-box"><span class="icon-emoji">📘</span></div><div class="icon-title">角色档案</div></div>
          <div class="icon-item"><div class="icon-box"><span class="icon-emoji">🖼️</span></div><div class="icon-title">外观设置</div></div>
          <div class="icon-item"><div class="icon-box"><span class="icon-emoji">🔤</span></div><div class="icon-title">字体</div></div>
          <div class="icon-item"><div class="icon-box"><span class="icon-emoji">📞</span></div><div class="icon-title">Cphone</div></div>
        </div>

        <div class="card anniv" style="margin-top:14px">
          <div>
            <div style="font-size:36px;opacity:.65;">♡</div>
            <div id="anniv-text">暂无纪念日</div>
          </div>
        </div>
      </div>

      <div class="dock">
        <div class="icon-item" data-open="chat"><div class="icon-box" style="width:64px;height:64px"><span class="icon-emoji">💬</span></div><div class="icon-title">聊天</div></div>
        <div class="icon-item" data-open="settings"><div class="icon-box" style="width:64px;height:64px"><span class="icon-emoji">🛠️</span></div><div class="icon-title">API</div></div>
        <div class="icon-item"><div class="icon-box" style="width:64px;height:64px"><span class="icon-emoji">📚</span></div><div class="icon-title">世界书</div></div>
        <div class="icon-item"><div class="icon-box" style="width:64px;height:64px"><span class="icon-emoji">👥</span></div><div class="icon-title">论坛</div></div>
      </div>
      <button class="fab" id="fab-menu">≡</button>
    </section>

    <!-- CHAT -->
    <section class="page" id="page-chat">
      <div class="topbar">
        <button class="back-btn" data-back>‹</button>
        <div class="bar-title">Chat</div>
        <button class="tool-btn" id="chat-clear">⌫</button>
      </div>
      <div class="chat-wrap">
        <div class="chat-list" id="chat-list"></div>
        <div class="composer">
          <textarea id="chat-input" placeholder="输入消息，回车发送（Shift+Enter换行）"></textarea>
          <button id="chat-send" class="send-btn">发送</button>
        </div>
      </div>
    </section>

    <!-- SETTINGS -->
    <section class="page" id="page-settings">
      <div class="topbar">
        <button class="back-btn" data-back>‹</button>
        <div class="bar-title">设置</div>
        <button class="tool-btn" id="save-all">✓</button>
      </div>
      <div class="settings-scroll">
        <div class="card">
          <h3>API 配置</h3>
          <div class="field">
            <label>配置名（可保存多套）</label>
            <div class="row">
              <select id="profile-select" class="select"></select>
              <input id="profile-name" class="input" placeholder="例如：默认 / 反代A" />
            </div>
          </div>

          <div class="field">
            <label>请求URL（优先级最高，支持直接填反代地址）</label>
            <input id="request-url" class="input" placeholder="https://xxx.com/v1/chat/completions" />
          </div>

          <div class="field">
            <label>Base URL（未填请求URL时生效）</label>
            <input id="base-url" class="input" placeholder="https://api.example.com" />
          </div>

          <div class="field">
            <label>Chat Path</label>
            <input id="chat-path" class="input" placeholder="/v1/chat/completions" />
          </div>

          <div class="row">
            <div class="field">
              <label>API Key</label>
              <input id="api-key" class="input" placeholder="sk-..." />
            </div>
            <div class="field">
              <label>模型</label>
              <input id="model" class="input" placeholder="gpt-4o-mini" />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label>温度</label>
              <input id="temperature" class="input" type="number" min="0" max="2" step="0.1" />
            </div>
            <div class="field">
              <label>max_tokens</label>
              <input id="max-tokens" class="input" type="number" min="1" max="8192" step="1" />
            </div>
          </div>

          <div class="switch">
            <span>流式输出（stream）</span>
            <input id="stream" type="checkbox" />
          </div>
          <div class="switch">
            <span>在消息中显示时间戳</span>
            <input id="show-time" type="checkbox" />
          </div>

          <div class="actions" style="margin-top:10px">
            <button class="btn" id="btn-save-profile">保存配置</button>
            <button class="btn secondary" id="btn-new-profile">新建配置</button>
            <button class="btn secondary" id="btn-load-models">拉取模型</button>
            <button class="btn danger" id="btn-delete-profile">删除配置</button>
          </div>
          <div class="hint" id="api-status" style="margin-top:8px">状态：就绪</div>
        </div>

        <div class="card">
          <h3>外观</h3>
          <div class="field">
            <label>上传壁纸</label>
            <input id="wallpaper-file" type="file" accept="image/*" class="input" style="padding-top:8px" />
          </div>
          <div class="field">
            <label>主卡片图片</label>
            <input id="cover-file" type="file" accept="image/*" class="input" style="padding-top:8px" />
          </div>
          <div class="actions">
            <button class="btn secondary" id="btn-reset-look">恢复默认外观</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const KEY_APP = "api_phone_app_v2";
    const KEY_MSG = "api_phone_msgs_v2";

    const defaultProfile = {
      name: "默认",
      requestUrl: "",
      baseUrl: "",
      chatPath: "/v1/chat/completions",
      apiKey: "",
      model: "gpt-4o-mini",
      temperature: 0.7,
      maxTokens: 1024,
      stream: true,
      showTime: false
    };

    const defaultState = {
      profiles: [defaultProfile],
      currentProfile: "默认",
      wallpaper: "",
      cover: "",
      anniversary: ""
    };

    const app = load(KEY_APP, defaultState);
    let messages = load(KEY_MSG, []);

    const el = {
      pages: {
        home: document.getElementById("page-home"),
        chat: document.getElementById("page-chat"),
        settings: document.getElementById("page-settings")
      },
      statusTime: document.getElementById("status-time"),
      dateLine: document.getElementById("date-line"),
      clockBig: document.getElementById("clock-big"),
      batteryFill: document.getElementById("battery-fill"),
      wallpaper: document.getElementById("wallpaper"),
      coupleImg: document.getElementById("couple-img"),
      annivText: document.getElementById("anniv-text"),
      chatList: document.getElementById("chat-list"),
      chatInput: document.getElementById("chat-input"),
      chatSend: document.getElementById("chat-send"),
      chatClear: document.getElementById("chat-clear"),
      profileSelect: document.getElementById("profile-select"),
      profileName: document.getElementById("profile-name"),
      requestUrl: document.getElementById("request-url"),
      baseUrl: document.getElementById("base-url"),
      chatPath: document.getElementById("chat-path"),
      apiKey: document.getElementById("api-key"),
      model: document.getElementById("model"),
      temperature: document.getElementById("temperature"),
      maxTokens: document.getElementById("max-tokens"),
      stream: document.getElementById("stream"),
      showTime: document.getElementById("show-time"),
      apiStatus: document.getElementById("api-status"),
      wallpaperFile: document.getElementById("wallpaper-file"),
      coverFile: document.getElementById("cover-file"),
      saveAll: document.getElementById("save-all"),
      btnSaveProfile: document.getElementById("btn-save-profile"),
      btnNewProfile: document.getElementById("btn-new-profile"),
      btnDeleteProfile: document.getElementById("btn-delete-profile"),
      btnLoadModels: document.getElementById("btn-load-models"),
      btnResetLook: document.getElementById("btn-reset-look"),
      fabMenu: document.getElementById("fab-menu")
    };

    function load(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if(!raw) return structuredClone(fallback);
        return Object.assign(structuredClone(fallback), JSON.parse(raw));
      }catch{
        return structuredClone(fallback);
      }
    }
    function save(key, value){ localStorage.setItem(key, JSON.stringify(value)); }

    function getCurrentProfile(){
      let p = app.profiles.find(i => i.name === app.currentProfile);
      if(!p){ p = structuredClone(defaultProfile); app.profiles=[p]; app.currentProfile=p.name; }
      return p;
    }

    function go(page){
      Object.values(el.pages).forEach(p => p.classList.remove("active"));
      el.pages[page].classList.add("active");
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function formatNow(){
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,"0");
      const mm = String(d.getMinutes()).padStart(2,"0");
      const week = "日一二三四五六"[d.getDay()];
      return {
        time: `${hh}:${mm}`,
        date: `${d.getMonth()+1}月${d.getDate()}日 星期${week}`
      };
    }

    function tick(){
      const t = formatNow();
      el.statusTime.textContent = t.time;
      el.clockBig.textContent = t.time;
      el.dateLine.textContent = t.date;
      const fakeBattery = 35 + Math.floor((Date.now()/1000)%60);
      const w = Math.max(6, Math.min(24, fakeBattery * 0.26));
      el.batteryFill.setAttribute("width", String(w));
    }

    function renderProfiles(){
      el.profileSelect.innerHTML = "";
      app.profiles.forEach(p => {
        const op = document.createElement("option");
        op.value = p.name; op.textContent = p.name;
        el.profileSelect.appendChild(op);
      });
      el.profileSelect.value = app.currentProfile;
      fillProfileForm(getCurrentProfile());
    }

    function fillProfileForm(p){
      el.profileName.value = p.name || "";
      el.requestUrl.value = p.requestUrl || "";
      el.baseUrl.value = p.baseUrl || "";
      el.chatPath.value = p.chatPath || "/v1/chat/completions";
      el.apiKey.value = p.apiKey || "";
      el.model.value = p.model || "gpt-4o-mini";
      el.temperature.value = p.temperature ?? 0.7;
      el.maxTokens.value = p.maxTokens ?? 1024;
      el.stream.checked = !!p.stream;
      el.showTime.checked = !!p.showTime;
    }

    function readProfileForm(){
      const p = {
        name: (el.profileName.value || "默认").trim(),
        requestUrl: el.requestUrl.value.trim(),
        baseUrl: el.baseUrl.value.trim().replace(/\/+$/,""),
        chatPath: (el.chatPath.value.trim() || "/v1/chat/completions"),
        apiKey: el.apiKey.value.trim(),
        model: (el.model.value.trim() || "gpt-4o-mini"),
        temperature: Number(el.temperature.value || 0.7),
        maxTokens: Number(el.maxTokens.value || 1024),
        stream: !!el.stream.checked,
        showTime: !!el.showTime.checked
      };
      if(!p.chatPath.startsWith("/")) p.chatPath = "/" + p.chatPath;
      return p;
    }

    function saveCurrentProfile(){
      const profile = readProfileForm();
      const oldName = app.currentProfile;
      const idx = app.profiles.findIndex(i => i.name === oldName);
      if(idx >= 0) app.profiles.splice(idx,1);
      const duplicate = app.profiles.find(i => i.name === profile.name);
      if(duplicate){
        Object.assign(duplicate, profile);
      }else{
        app.profiles.push(profile);
      }
      app.currentProfile = profile.name;
      save(KEY_APP, app);
      renderProfiles();
      setApiStatus("状态：配置已保存");
    }

    function setApiStatus(t){ el.apiStatus.textContent = t; }

    function getChatUrl(profile){
      if(profile.requestUrl) return profile.requestUrl;
      if(!profile.baseUrl) throw new Error("请填写请求URL或Base URL");
      return profile.baseUrl + (profile.chatPath || "/v1/chat/completions");
    }

    function addMsg(role, content, time){
      const div = document.createElement("div");
      div.className = "msg " + role;
      const p = getCurrentProfile();
      let text = String(content ?? "");
      if(p.showTime && role !== "system"){
        text = `${time || formatNow().time}\n${text}`;
      }
      div.innerHTML = escapeHtml(text);
      el.chatList.appendChild(div);
      el.chatList.scrollTop = el.chatList.scrollHeight;
      return div;
    }

    function renderMsgs(){
      el.chatList.innerHTML = "";
      if(!messages.length){
        addMsg("system","欢迎使用 API 小手机。先在设置里填好 URL / Key / 模型。");
        return;
      }
      messages.forEach(m => addMsg(m.role, m.content, m.time));
    }

    function autoGrow(){
      el.chatInput.style.height = "auto";
      el.chatInput.style.height = Math.min(124, el.chatInput.scrollHeight) + "px";
    }

    async function sendMessage(){
      const text = el.chatInput.value.trim();
      if(!text) return;
      const profile = getCurrentProfile();

      const time = formatNow().time;
      messages.push({ role:"user", content:text, time });
      save(KEY_MSG, messages);
      addMsg("user", text, time);
      el.chatInput.value = "";
      autoGrow();

      let replyNode = addMsg("assistant", profile.stream ? "..." : "");
      el.chatSend.disabled = true;
      setApiStatus("状态：请求中...");

      try{
        const url = getChatUrl(profile);
        const headers = { "Content-Type":"application/json" };
        if(profile.apiKey) headers["Authorization"] = "Bearer " + profile.apiKey;

        const body = {
          model: profile.model,
          temperature: Math.max(0, Math.min(2, profile.temperature ?? 0.7)),
          max_tokens: Math.max(1, profile.maxTokens ?? 1024),
          stream: !!profile.stream,
          messages: messages.map(m => ({ role: m.role, content: m.content }))
        };

        const res = await fetch(url, {
          method:"POST",
          headers,
          body: JSON.stringify(body)
        });

        if(!res.ok){
          const t = await res.text().catch(()=> "");
          throw new Error(`HTTP ${res.status} ${t}`);
        }

        let reply = "";
        if(profile.stream && res.body){
          const reader = res.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";

          while(true){
            const {done, value} = await reader.read();
            if(done) break;
            buffer += decoder.decode(value, {stream:true});

            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for(const lineRaw of lines){
              const line = lineRaw.trim();
              if(!line.startsWith("data:")) continue;
              const data = line.slice(5).trim();
              if(data === "[DONE]") continue;
              try{
                const json = JSON.parse(data);
                const delta = json?.choices?.[0]?.delta?.content ?? "";
                if(delta){
                  reply += delta;
                  replyNode.textContent = profile.showTime ? `${formatNow().time}\n${reply}` : reply;
                  el.chatList.scrollTop = el.chatList.scrollHeight;
                }
              }catch{}
            }
          }
          if(!reply){
            reply = "（流式返回为空）";
            replyNode.textContent = reply;
          }
        }else{
          const data = await res.json();
          reply = data?.choices?.[0]?.message?.content ?? data?.reply ?? data?.output_text ?? "（接口返回为空）";
          replyNode.textContent = profile.showTime ? `${formatNow().time}\n${reply}` : reply;
        }

        messages.push({ role:"assistant", content:String(reply), time: formatNow().time });
        save(KEY_MSG, messages);
        setApiStatus("状态：完成");
      }catch(err){
        replyNode.className = "msg system";
        replyNode.textContent = "请求失败：" + (err?.message || String(err));
        setApiStatus("状态：失败");
      }finally{
        el.chatSend.disabled = false;
      }
    }

    async function loadModels(){
      const p = getCurrentProfile();
      let root = p.baseUrl;
      if(!root && p.requestUrl){
        try{
          const u = new URL(p.requestUrl);
          root = u.origin;
        }catch{}
      }
      if(!root){
        setApiStatus("状态：拉取模型失败，未配置Base URL");
        return;
      }

      try{
        const headers = {};
        if(p.apiKey) headers["Authorization"] = "Bearer " + p.apiKey;
        const res = await fetch(root.replace(/\/+$/,"") + "/v1/models", { headers });
        if(!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        const arr = (data.data || []).map(i => i.id).filter(Boolean);
        if(arr.length){
          el.model.value = arr[0];
          setApiStatus("状态：模型拉取成功，共 " + arr.length + " 个");
        }else{
          setApiStatus("状态：模型列表为空");
        }
      }catch(e){
        setApiStatus("状态：拉取模型失败");
      }
    }

    function setupFiles(){
      el.wallpaperFile.addEventListener("change", (ev) => {
        const f = ev.target.files?.[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = () => {
          app.wallpaper = String(reader.result || "");
          applyLook();
          save(KEY_APP, app);
        };
        reader.readAsDataURL(f);
      });

      el.coverFile.addEventListener("change", (ev) => {
        const f = ev.target.files?.[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = () => {
          app.cover = String(reader.result || "");
          applyLook();
          save(KEY_APP, app);
        };
        reader.readAsDataURL(f);
      });
    }

    function applyLook(){
      if(app.wallpaper){
        el.wallpaper.style.backgroundImage = `url("${app.wallpaper}")`;
      }else{
        el.wallpaper.style.backgroundImage = "linear-gradient(180deg,#d9e8f6 0%,#cfe1f1 42%,#dbe9f5 100%)";
      }
      if(app.cover) el.coupleImg.src = app.cover;
      el.annivText.textContent = app.anniversary || "暂无纪念日";
    }

    function initSnow(){
      const c = document.getElementById("snow");
      const ctx = c.getContext("2d");
      let w=0,h=0,flakes=[];
      const count = 38;

      function resize(){
        w = c.width = c.clientWidth * devicePixelRatio;
        h = c.height = c.clientHeight * devicePixelRatio;
        ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
      }
      function reset(){
        flakes = Array.from({length:count}, () => ({
          x: Math.random()*c.clientWidth,
          y: Math.random()*c.clientHeight,
          r: Math.random()*2.2 + .8,
          v: Math.random()*.45 + .18,
          d: (Math.random()-.5)*.25,
          o: Math.random()*.35 + .1
        }));
      }
      function draw(){
        ctx.clearRect(0,0,c.clientWidth,c.clientHeight);
        for(const f of flakes){
          ctx.beginPath();
          ctx.fillStyle = `rgba(180,220,250,${f.o})`;
          ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
          ctx.fill();
          f.y += f.v;
          f.x += f.d;
          if(f.y > c.clientHeight + 8){ f.y = -8; f.x = Math.random()*c.clientWidth; }
          if(f.x < -10) f.x = c.clientWidth + 6;
          if(f.x > c.clientWidth + 10) f.x = -6;
        }
        requestAnimationFrame(draw);
      }
      resize(); reset(); draw();
      addEventListener("resize", () => { resize(); reset(); }, {passive:true});
    }

    // events
    document.querySelectorAll("[data-open]").forEach(i => {
      i.addEventListener("click", () => go(i.dataset.open));
    });
    document.querySelectorAll("[data-back]").forEach(i => {
      i.addEventListener("click", () => go("home"));
    });

    el.fabMenu.addEventListener("click", () => go("settings"));
    el.chatSend.addEventListener("click", sendMessage);
    el.chatInput.addEventListener("input", autoGrow);
    el.chatInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendMessage();
      }
    });

    el.chatClear.addEventListener("click", () => {
      messages = [];
      save(KEY_MSG, messages);
      renderMsgs();
    });

    el.profileSelect.addEventListener("change", () => {
      app.currentProfile = el.profileSelect.value;
      save(KEY_APP, app);
      fillProfileForm(getCurrentProfile());
      setApiStatus("状态：已切换配置");
    });

    el.btnSaveProfile.addEventListener("click", saveCurrentProfile);
    el.saveAll.addEventListener("click", saveCurrentProfile);
    el.btnLoadModels.addEventListener("click", loadModels);

    el.btnNewProfile.addEventListener("click", () => {
      const n = "配置" + (app.profiles.length + 1);
      const p = structuredClone(defaultProfile);
      p.name = n;
      app.profiles.push(p);
      app.currentProfile = n;
      save(KEY_APP, app);
      renderProfiles();
      setApiStatus("状态：已新建配置");
    });

    el.btnDeleteProfile.addEventListener("click", () => {
      if(app.profiles.length <= 1){
        setApiStatus("状态：至少保留一套配置");
        return;
      }
      const name = app.currentProfile;
      app.profiles = app.profiles.filter(i => i.name !== name);
      app.currentProfile = app.profiles[0].name;
      save(KEY_APP, app);
      renderProfiles();
      setApiStatus("状态：配置已删除");
    });

    el.btnResetLook.addEventListener("click", () => {
      app.wallpaper = "";
      app.cover = "";
      save(KEY_APP, app);
      applyLook();
    });

    // init
    tick(); setInterval(tick, 1000);
    renderProfiles();
    renderMsgs();
    applyLook();
    setupFiles();
    initSnow();
  </script>
</body>
</html>
