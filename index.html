<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>小手机 v1.1</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    #app{max-width:430px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:#111}
    .screen{position:absolute;inset:0;display:none;background:#f7f7fb}
    .screen.active{display:block}
    .header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#fff;border-bottom:1px solid #e9e9ef}
    .btn{border:none;border-radius:10px;padding:8px 12px;font-size:13px;background:#edf2ff;color:#173a7a;cursor:pointer}
    .btn.p{background:#2f66d8;color:#fff}
    .btn.d{background:#d9534f;color:#fff}
    .page{height:calc(100% - 52px);overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .card{background:#fff;border:1px solid #ececf2;border-radius:14px;padding:12px}
    .small{font-size:12px;color:#777}
    .input,.ta,.select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;background:#fff;font-size:16px}
    .ta{min-height:44px;resize:none}
    .row{display:flex;gap:8px;align-items:center}

    /* HOME */
    #home{color:#fff}
    .wall{
      position:absolute;inset:0;background:
      linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)),
      url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
      z-index:0
    }
    .home-layer{position:relative;z-index:2;height:100%;padding:18px 12px 14px;display:flex;flex-direction:column}
    .windchime{
      position:absolute;right:14px;top:22px;width:62px;height:150px;z-index:3;pointer-events:none;
      transform-origin:top center;animation:swing 3.2s ease-in-out infinite;
      filter:drop-shadow(0 6px 10px rgba(0,0,0,.25))
    }
    .windchime .line{position:absolute;left:30px;top:0;width:2px;height:66px;background:linear-gradient(#ffe8b5,#8b6632)}
    .windchime .ring{position:absolute;left:10px;top:62px;width:42px;height:42px;border-radius:50%;border:2px solid rgba(230,197,133,.95);box-shadow:inset 0 0 14px rgba(0,0,0,.22)}
    .windchime .tag{position:absolute;left:24px;top:106px;width:14px;height:32px;border-radius:8px;background:linear-gradient(180deg,#f6d89f,#c89b57)}
    @keyframes swing{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-6deg)}}

    .date{font-size:15px;opacity:.95}
    .time{font-size:72px;font-weight:760;letter-spacing:-2px;text-shadow:0 2px 12px rgba(0,0,0,.2)}
    .widgets{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .widget{
      background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.46);
      border-radius:18px;padding:10px 12px;backdrop-filter:blur(12px)
    }
    .widget .t{font-size:12px;opacity:.88}
    .widget .v{font-size:16px;font-weight:700;margin-top:4px}
    .grid{margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px}
    .icon{text-align:center}
    .ibox{
      width:62px;height:62px;margin:0 auto 6px;border-radius:16px;display:grid;place-items:center;
      background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.45);font-size:27px;cursor:pointer
    }
    .lab{font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.25)}

    /* list */
    .list{display:flex;flex-direction:column;gap:8px}
    .item{background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;display:flex;gap:10px;align-items:center}
    .avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#eef2ff;flex-shrink:0}
    .main{flex:1;min-width:0;cursor:pointer}
    .name{font-weight:600;color:#222}
    .preview{margin-top:4px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t{font-size:11px;color:#999}

    /* chat */
    #chatMsgs{
      height:calc(100% - 52px - 68px);
      overflow:auto;padding:12px;background:#eef1f6;
      display:flex;flex-direction:column;gap:10px
    }
    .msg-row{display:flex;gap:8px;align-items:flex-end}
    .msg-row.me{justify-content:flex-end}
    .chat-avatar{width:32px;height:32px;border-radius:10px;object-fit:cover;background:#dde6ff;flex-shrink:0}
    .bubble{
      max-width:74%;padding:10px 12px;border-radius:14px;line-height:1.45;
      word-break:break-word;white-space:pre-wrap
    }
    .bubble.me{background:#2f66d8;color:#fff;border-bottom-right-radius:6px}
    .bubble.ai{background:#fff;border:1px solid #e8e8ef;border-bottom-left-radius:6px}

    .chatInputBar{
      position:absolute;left:0;right:0;bottom:0;padding:10px;background:#fff;border-top:1px solid #e9e9ef;
      display:flex;gap:8px;align-items:flex-end
    }
    #chatInput{
      flex:1;height:44px;min-height:44px;max-height:96px;overflow-y:auto;resize:none;
    }

    /* modal */
    .modal-mask{
      position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:99;
      display:none;place-items:center;padding:12px
    }
    .modal-card{
      width:100%;max-width:360px;max-height:90dvh;overflow:auto;
      background:#fff;border-radius:14px;padding:12px;box-shadow:0 10px 30px rgba(0,0,0,.18)
    }
    .preview-img{width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid #eee;background:#f3f5ff}
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <section id="home" class="screen active">
    <div class="wall"></div>
    <div class="windchime"><span class="line"></span><span class="ring"></span><span class="tag"></span></div>
    <div class="home-layer">
      <div class="date" id="homeDate"></div>
      <div class="time" id="homeTime"></div>

      <div class="widgets">
        <div class="widget"><div class="t">纪念日</div><div class="v">第 233 天</div></div>
        <div class="widget"><div class="t">天气</div><div class="v">22°C 晴</div></div>
      </div>

      <div class="grid">
        <div class="icon" data-nav="wechat"><div class="ibox">💬</div><div class="lab">微信</div></div>
        <div class="icon" data-nav="api"><div class="ibox">🔑</div><div class="lab">API</div></div>
      </div>
    </div>
  </section>

  <!-- WeChat -->
  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>微信</b>
      <div class="row">
        <button class="btn" id="addContactBtn">+联系人</button>
      </div>
    </div>
    <div class="page">
      <input id="searchInput" class="input" placeholder="搜索联系人" />
      <div id="contactList" class="list"></div>
    </div>
  </section>

  <!-- Chat -->
  <section id="chatRoom" class="screen">
    <div class="header">
      <button class="btn" data-nav="wechat">‹ 返回</button>
      <b id="chatTitle">聊天</b>
      <div class="row">
        <button class="btn" id="chatSettingsBtn">设置</button>
        <button class="btn" id="clearChatBtn">清空</button>
      </div>
    </div>
    <div id="chatMsgs"></div>
    <div class="chatInputBar">
      <textarea id="chatInput" class="ta" placeholder="输入消息..."></textarea>
      <button class="btn p" id="sendBtn">发送</button>
    </div>
  </section>

  <!-- API -->
  <section id="api" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>API 设置</b>
      <button class="btn p" id="saveApiBtn">保存</button>
    </div>
    <div class="page">
      <div class="card">
        <div class="small">Base URL（反代）</div>
        <input id="apiBase" class="input" placeholder="https://api.cetaceang.qzz.io" />
      </div>
      <div class="card">
        <div class="small">API Key</div>
        <input id="apiKey" class="input" type="password" placeholder="sk-..." />
      </div>
      <div class="card">
        <div class="small">Model</div>
        <select id="apiModel" class="select"></select>
        <div style="margin-top:8px">
          <button class="btn" id="fetchModelsBtn">拉取模型</button>
        </div>
      </div>
      <div class="card">
        <div class="small">Temperature</div>
        <input id="apiTemp" class="input" type="number" min="0" max="2" step="0.1" value="0.8" />
      </div>
      <div class="card">
        <button class="btn" id="testApiBtn">测试连接</button>
        <div id="apiStatus" class="small" style="margin-top:8px;">状态：未测试</div>
      </div>
    </div>
  </section>

  <!-- 创建联系人 -->
  <div id="contactModal" class="modal-mask">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">创建联系人</h3>

      <div class="small">昵称</div>
      <input id="newName" class="input" placeholder="例如：沈昼白" />

      <div class="small" style="margin-top:8px;">头像（上传 或 URL）</div>
      <div class="row">
        <button class="btn" id="pickNewAvatarBtn">上传头像</button>
        <input id="newAvatarUrl" class="input" placeholder="https://..." />
      </div>
      <input id="newAvatarFile" type="file" accept="image/*" class="hidden" />
      <img id="newAvatarPreview" class="preview-img hidden" style="margin-top:8px;" />

      <div class="small" style="margin-top:8px;">人设（长文本）</div>
      <textarea id="newPersona" class="ta" style="min-height:220px;" placeholder="写完整人设..."></textarea>

      <div class="row" style="justify-content:flex-end;margin-top:10px">
        <button class="btn" id="cancelNewBtn">取消</button>
        <button class="btn p" id="saveNewBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 聊天设置 -->
  <div id="chatSettingsModal" class="modal-mask">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">聊天设置</h3>

      <div class="card">
        <b style="font-size:14px">对方（角色）</b>
        <div class="small" style="margin-top:8px;">昵称</div>
        <input id="editRoleName" class="input" />
        <div class="small" style="margin-top:8px;">头像（上传 或 URL）</div>
        <div class="row">
          <button class="btn" id="pickRoleAvatarBtn">上传头像</button>
          <input id="editRoleAvatarUrl" class="input" placeholder="https://..." />
        </div>
        <input id="editRoleAvatarFile" type="file" accept="image/*" class="hidden" />
        <img id="editRoleAvatarPreview" class="preview-img hidden" style="margin-top:8px;" />
        <div class="small" style="margin-top:8px;">人设</div>
        <textarea id="editRolePersona" class="ta" style="min-height:180px;"></textarea>
      </div>

      <div class="card">
        <b style="font-size:14px">我（用户）</b>
        <div class="small" style="margin-top:8px;">昵称</div>
        <input id="editMeName" class="input" />
        <div class="small" style="margin-top:8px;">头像（上传 或 URL）</div>
        <div class="row">
          <button class="btn" id="pickMeAvatarBtn">上传头像</button>
          <input id="editMeAvatarUrl" class="input" placeholder="https://..." />
        </div>
        <input id="editMeAvatarFile" type="file" accept="image/*" class="hidden" />
        <img id="editMeAvatarPreview" class="preview-img hidden" style="margin-top:8px;" />
        <div class="small" style="margin-top:8px;">我的人设</div>
        <textarea id="editMePersona" class="ta" style="min-height:140px;"></textarea>
      </div>

      <div class="row" style="justify-content:flex-end;margin-top:10px">
        <button class="btn" id="cancelSettingsBtn">取消</button>
        <button class="btn p" id="saveSettingsBtn">保存</button>
      </div>
    </div>
  </div>

</div>

<script>
(() => {
  const K_API='mini_api_v11';
  const K_CONTACT='mini_contacts_v11';
  const K_CHAT='mini_chats_v11';
  const K_ME='mini_me_v11';

  let currentId=null;
  let newAvatarData='';
  let roleAvatarData='';
  let meAvatarData='';

  const $ = id => document.getElementById(id);
  const getJ=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));}catch{return d;}};
  const setJ=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
  const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));

  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const el=$(id); if(el) el.classList.add('active');
  }

  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=>show(el.getAttribute('data-nav')));
  });

  // time
  function tick(){
    const n=new Date(), h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()).padStart(2,'0');
    const w=['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
    $('homeDate').textContent=`${n.getMonth()+1}月${n.getDate()}日 ${w}`;
    $('homeTime').textContent=`${h}:${m}`;
  }
  tick(); setInterval(tick,1000);

  // data
  function getContacts(){
    let arr=getJ(K_CONTACT,null);
    if(!arr){
      arr=[{
        id:'c1',
        name:'沈昼白',
        avatar:'https://i.postimg.cc/y8xWzCqj/anime-boy.jpg',
        preview:'在吗 我刚遛狗回来',
        time:'刚刚',
        persona:'计算机系大三，爱分享日常，嘴硬心软'
      }];
      setJ(K_CONTACT,arr);
    }
    return arr;
  }
  function setContacts(a){ setJ(K_CONTACT,a); }
  function getChats(){ return getJ(K_CHAT,{}); }
  function setChats(m){ setJ(K_CHAT,m); }
  function getMe(){ return getJ(K_ME,{name:'我',avatar:'',persona:''}); }
  function setMe(v){ setJ(K_ME,v); }

  // image compress
  function compressImage(file,maxSide=280,quality=0.55){
    return new Promise((resolve,reject)=>{
      const fr=new FileReader();
      fr.onload=()=>{
        const img=new Image();
        img.onload=()=>{
          let w=img.width,h=img.height;
          const s=Math.min(1,maxSide/Math.max(w,h));
          w=Math.round(w*s);h=Math.round(h*s);
          const c=document.createElement('canvas');
          c.width=w;c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          let out='';
          try{ out=c.toDataURL('image/webp',quality);}catch(e){}
          if(!out || out.startsWith('data:,')) out=c.toDataURL('image/jpeg',quality);
          resolve(out);
        };
        img.onerror=reject;
        img.src=fr.result;
      };
      fr.onerror=reject;
      fr.readAsDataURL(file);
    });
  }

  // contacts list
  function renderContacts(keyword=''){
    const k=(keyword||'').trim();
    const arr=getContacts().filter(c=>!k||c.name.includes(k)||(c.preview||'').includes(k));
    $('contactList').innerHTML=arr.map(c=>`
      <div class="item">
        <img class="avatar" src="${c.avatar||'https://via.placeholder.com/88x88?text=头像'}"/>
        <div class="main" onclick="openChat('${c.id}')">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div class="name">${esc(c.name)}</div>
            <div class="t">${esc(c.time||'')}</div>
          </div>
          <div class="preview">${esc(c.preview||'')}</div>
        </div>
      </div>
    `).join('') || `<div class="card small">暂无联系人</div>`;
  }

  // create contact modal
  function openContactModal(){
    $('contactModal').style.display='grid';
  }
  function closeContactModal(){
    $('contactModal').style.display='none';
    $('newName').value=''; $('newAvatarUrl').value=''; $('newPersona').value='';
    newAvatarData=''; $('newAvatarPreview').classList.add('hidden'); $('newAvatarPreview').src='';
  }

  async function saveContact(){
    const name=($('newName').value||'').trim();
    if(!name) return alert('昵称不能为空');
    const avatarUrl=($('newAvatarUrl').value||'').trim();
    const persona=($('newPersona').value||'').trim();

    const arr=getContacts();
    arr.unshift({
      id:'c'+Date.now()+'_'+Math.floor(Math.random()*9999),
      name,
      avatar:newAvatarData||avatarUrl||'',
      preview:'新的聊天已创建',
      time:'刚刚',
      persona
    });
    try{
      setContacts(arr);
    }catch{
      return alert('保存失败：本地存储空间不足');
    }
    renderContacts($('searchInput').value||'');
    closeContactModal();
  }

  $('addContactBtn').addEventListener('click', openContactModal);
  $('cancelNewBtn').addEventListener('click', closeContactModal);
  $('saveNewBtn').addEventListener('click', saveContact);
  $('contactModal').addEventListener('click',e=>{ if(e.target.id==='contactModal') closeContactModal(); });

  $('pickNewAvatarBtn').addEventListener('click',()=> $('newAvatarFile').click());
  $('newAvatarFile').addEventListener('change', async e=>{
    const f=e.target.files?.[0]; if(!f) return;
    newAvatarData=await compressImage(f,280,0.55);
    $('newAvatarPreview').src=newAvatarData;
    $('newAvatarPreview').classList.remove('hidden');
    e.target.value='';
  });

  $('searchInput').addEventListener('input',e=>renderContacts(e.target.value||''));

  // chat
  window.openChat=function(id){
    currentId=id;
    const c=getContacts().find(x=>x.id===id);
    $('chatTitle').textContent=c?c.name:'聊天';
    renderChat();
    show('chatRoom');
  };

  function renderChat(){
    const c=getContacts().find(x=>x.id===currentId);
    const me=getMe();
    const roleAvatar = c?.avatar || 'https://via.placeholder.com/64x64?text=TA';
    const meAvatar = me.avatar || 'https://via.placeholder.com/64x64?text=我';

    const map=getChats();
    const arr=map[currentId]||[];

    $('chatMsgs').innerHTML=arr.map(m=>{
      if(m.role==='user'){
        return `
          <div class="msg-row me">
            <div class="bubble me">${esc(m.text)}</div>
            <img class="chat-avatar" src="${meAvatar}" />
          </div>
        `;
      }
      return `
        <div class="msg-row">
          <img class="chat-avatar" src="${roleAvatar}" />
          <div class="bubble ai">${esc(m.text)}</div>
        </div>
      `;
    }).join('');

    $('chatMsgs').scrollTop=$('chatMsgs').scrollHeight;
  }

  function clearChat(){
    if(!currentId) return;
    if(!confirm('清空当前聊天？')) return;
    const map=getChats();
    map[currentId]=[];
    setChats(map);
    renderChat();
  }
  $('clearChatBtn').addEventListener('click', clearChat);

  // input behavior
  function resetInputHeight(){ $('chatInput').style.height='44px'; }
  $('chatInput').addEventListener('input', ()=>{
    // 固定上限，不无限长
    const el=$('chatInput');
    el.style.height='44px';
    el.style.height=Math.min(el.scrollHeight,96)+'px';
  });

  // api
  function loadApi(){
    const cfg=getJ(K_API,{base:'',key:'',model:'gpt-4o-mini',temp:0.8});
    $('apiBase').value=cfg.base||'';
    $('apiKey').value=cfg.key||'';
    $('apiTemp').value=cfg.temp??0.8;
    $('apiModel').innerHTML=`<option value="${cfg.model||'gpt-4o-mini'}">${cfg.model||'gpt-4o-mini'}</option>`;
  }

  function saveApi(){
    const cfg={
      base:($('apiBase').value||'').trim(),
      key:($('apiKey').value||'').trim(),
      model:($('apiModel').value||'').trim()||'gpt-4o-mini',
      temp:Number($('apiTemp').value||0.8)
    };
    setJ(K_API,cfg);
    $('apiStatus').textContent='状态：已保存';
    return cfg;
  }

  function buildUrl(base,path){
    const b=(base||'').replace(/\/+$/,'');
    if(b.endsWith('/v1')) return b + path.replace('/v1','');
    return b + path;
  }

  async function callApi(messages){
    const cfg=saveApi();
    if(!cfg.base||!cfg.key) throw new Error('请先配置 Base URL 和 API Key');
    const url=buildUrl(cfg.base,'/v1/chat/completions');

    const r=await fetch(url,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+cfg.key
      },
      body:JSON.stringify({
        model:cfg.model,
        temperature:cfg.temp,
        messages
      })
    });

    const data=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(data?.error?.message || ('HTTP '+r.status));
    return data?.choices?.[0]?.message?.content?.trim() || '';
  }

  async function fetchModels(){
    try{
      const cfg=saveApi();
      if(!cfg.base||!cfg.key) throw new Error('请先配置 Base URL 和 API Key');
      $('apiStatus').textContent='状态：拉取模型中...';

      const url=buildUrl(cfg.base,'/v1/models');
      const r=await fetch(url,{headers:{'Authorization':'Bearer '+cfg.key}});
      const data=await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(data?.error?.message || ('HTTP '+r.status));

      const list=(data.data||[]).map(x=>x.id).filter(Boolean);
      if(!list.length) throw new Error('未返回模型列表');

      $('apiModel').innerHTML=list.map(m=>`<option value="${m}">${m}</option>`).join('');
      if(list.includes(cfg.model)) $('apiModel').value=cfg.model;
      $('apiStatus').textContent='状态：模型拉取成功（'+list.length+'）';
    }catch(e){
      $('apiStatus').textContent='状态：拉取失败 -> '+e.message;
    }
  }

  async function testApi(){
    try{
      $('apiStatus').textContent='状态：测试中...';
      const out=await callApi([{role:'user',content:'只回复 ok'}]);
      $('apiStatus').textContent='状态：连接成功 -> '+(out||'ok');
    }catch(e){
      $('apiStatus').textContent='状态：失败 -> '+e.message;
    }
  }

  $('saveApiBtn').addEventListener('click', saveApi);
  $('fetchModelsBtn').addEventListener('click', fetchModels);
  $('testApiBtn').addEventListener('click', testApi);

  // send
  async function sendMsg(){
    const text=($('chatInput').value||'').trim();
    if(!text||!currentId) return;

    const map=getChats();
    map[currentId]=map[currentId]||[];
    map[currentId].push({role:'user',text,time:Date.now()});
    setChats(map);
    $('chatInput').value='';
    resetInputHeight();
    renderChat();

    map[currentId].push({role:'assistant',text:'...',time:Date.now()});
    setChats(map);
    renderChat();

    try{
      const c=getContacts().find(x=>x.id===currentId);
      const hist=(map[currentId]||[]).filter(x=>x.text!=='...').slice(-20);
      const messages=[
        {role:'system',content:`你是${c?.name||'聊天对象'}。人设：${c?.persona||'自然聊天'}。回复自然简短。`},
        ...hist.map(x=>({role:x.role==='user'?'user':'assistant',content:x.text}))
      ];

      const out=await callApi(messages);

      const arr=map[currentId];
      if(arr.length&&arr[arr.length-1].text==='...') arr.pop();
      arr.push({role:'assistant',text:out||'...',time:Date.now()});
      setChats(map);

      // 更新预览
      const contacts=getContacts();
      const i=contacts.findIndex(x=>x.id===currentId);
      if(i>=0){
        contacts[i].preview=out||'...';
        contacts[i].time='刚刚';
        setContacts(contacts);
      }

      renderChat();
      renderContacts($('searchInput').value||'');
    }catch(e){
      const arr=map[currentId];
      if(arr.length&&arr[arr.length-1].text==='...') arr.pop();
      arr.push({role:'assistant',text:'请求失败：'+e.message,time:Date.now()});
      setChats(map);
      renderChat();
    }
  }

  $('sendBtn').addEventListener('click', sendMsg);
  $('chatInput').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){
      e.preventDefault();
      sendMsg();
    }
  });

  // chat settings modal
  function openChatSettings(){
    if(!currentId) return;
    const c=getContacts().find(x=>x.id===currentId);
    const me=getMe();

    $('editRoleName').value=c?.name||'';
    $('editRolePersona').value=c?.persona||'';
    $('editRoleAvatarUrl').value=c?.avatar||'';
    $('editRoleAvatarPreview').src=c?.avatar||'';
    c?.avatar ? $('editRoleAvatarPreview').classList.remove('hidden') : $('editRoleAvatarPreview').classList.add('hidden');

    $('editMeName').value=me.name||'我';
    $('editMePersona').value=me.persona||'';
    $('editMeAvatarUrl').value=me.avatar||'';
    $('editMeAvatarPreview').src=me.avatar||'';
    me.avatar ? $('editMeAvatarPreview').classList.remove('hidden') : $('editMeAvatarPreview').classList.add('hidden');

    roleAvatarData=''; meAvatarData='';
    $('chatSettingsModal').style.display='grid';
  }

  function closeChatSettings(){
    $('chatSettingsModal').style.display='none';
  }

  async function saveChatSettings(){
    if(!currentId) return;
    const contacts=getContacts();
    const i=contacts.findIndex(x=>x.id===currentId);
    if(i<0) return;

    const roleName=($('editRoleName').value||'').trim() || contacts[i].name;
    const rolePersona=($('editRolePersona').value||'').trim();
    const roleAvatarUrl=($('editRoleAvatarUrl').value||'').trim();

    contacts[i].name=roleName;
    contacts[i].persona=rolePersona;
    contacts[i].avatar=roleAvatarData || roleAvatarUrl || contacts[i].avatar || '';
    setContacts(contacts);

    const me=getMe();
    const meName=($('editMeName').value||'').trim() || '我';
    const mePersona=($('editMePersona').value||'').trim();
    const meAvatarUrl=($('editMeAvatarUrl').value||'').trim();
    setMe({
      name:meName,
      persona:mePersona,
      avatar: meAvatarData || meAvatarUrl || me.avatar || ''
    });

    $('chatTitle').textContent=roleName;
    renderContacts($('searchInput').value||'');
    renderChat();
    closeChatSettings();
    alert('聊天设置已保存');
  }

  $('chatSettingsBtn').addEventListener('click', openChatSettings);
  $('cancelSettingsBtn').addEventListener('click', closeChatSettings);
  $('saveSettingsBtn').addEventListener('click', saveChatSettings);
  $('chatSettingsModal').addEventListener('click',e=>{ if(e.target.id==='chatSettingsModal') closeChatSettings(); });

  $('pickRoleAvatarBtn').addEventListener('click',()=> $('editRoleAvatarFile').click());
  $('editRoleAvatarFile').addEventListener('change', async e=>{
    const f=e.target.files?.[0]; if(!f) return;
    roleAvatarData=await compressImage(f,280,0.55);
    $('editRoleAvatarPreview').src=roleAvatarData;
    $('editRoleAvatarPreview').classList.remove('hidden');
    e.target.value='';
  });

  $('pickMeAvatarBtn').addEventListener('click',()=> $('editMeAvatarFile').click());
  $('editMeAvatarFile').addEventListener('change', async e=>{
    const f=e.target.files?.[0]; if(!f) return;
    meAvatarData=await compressImage(f,280,0.55);
    $('editMeAvatarPreview').src=meAvatarData;
    $('editMeAvatarPreview').classList.remove('hidden');
    e.target.value='';
  });

  // init
  loadApi();
  renderContacts();
})();
</script>
</body>
</html>
