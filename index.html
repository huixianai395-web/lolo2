
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>小手机 v1.3.3 稳定</title>
  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --line:#e6e9f5;
      --bg:#f6f8ff;
      --blue:#2f66d8;
      --blue2:#5d8cff;
      --glass: rgba(255,255,255,.30);
      --glass-border: rgba(255,255,255,.48);
      --chat-mode-h: 44px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;height:100%;
      background:linear-gradient(160deg,#2c57c8,#5ba9ff);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    #app{
      width:100%;
      max-width:430px;
      height:100dvh;
      min-height:100dvh;
      margin:0 auto;
      position:relative;
      overflow:hidden;
      background:var(--bg);
    }

    .screen{position:absolute;inset:0;display:none;background:var(--bg)}
    .screen.active{display:block}

    .header{
      height:calc(52px + var(--safe-top));
      padding-top:var(--safe-top);
      display:flex;align-items:center;justify-content:space-between;
      padding-left:12px;padding-right:12px;
      background:linear-gradient(180deg,#f8f9ff,#f6f8ff);
      border-bottom:1px solid var(--line);
    }

    .btn{
      border:none;border-radius:10px;padding:8px 12px;font-size:13px;
      background:#edf2ff;color:#173a7a;cursor:pointer;
    }
    .btn.p{background:var(--blue);color:#fff}
    .btn.d{background:#d9534f;color:#fff}

    .page{
      height:calc(100% - (52px + var(--safe-top)));
      overflow:auto;
      padding:12px;
      padding-bottom:calc(12px + var(--safe-bottom));
      display:flex;flex-direction:column;gap:10px;
      background:var(--bg);
    }

    .card{background:#fff;border:1px solid #ececf2;border-radius:14px;padding:12px}
    .small{font-size:12px;color:#777;line-height:1.5}
    .row{display:flex;gap:8px;align-items:center}
    .input,.ta,.select{
      width:100%;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fff;
      font-size:16px;
    }
    .ta{resize:none}
    .hidden{display:none !important}

    /* HOME */
    #home{color:#fff;background:transparent}
    .wall{
      position:absolute;
      left:0;right:0;
      top:calc(-1 * var(--safe-top));
      bottom:0;
      height:calc(100% + var(--safe-top));
      z-index:0;
      background:
        linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)),
        url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
    }
    .home-layer{
      position:relative;z-index:2;height:100%;
      padding:calc(18px + var(--safe-top)) 12px calc(14px + var(--safe-bottom));
      display:flex;flex-direction:column;
    }
    .date{font-size:15px;opacity:.95}
    .time{
      font-size:72px;line-height:1.02;font-weight:760;letter-spacing:-2px;
      text-shadow:0 2px 12px rgba(0,0,0,.2);
    }

    /* 风铃（更明显） */
    .windchime{
      position:absolute;
      top:calc(6px + var(--safe-top));
      right:12px;
      width:74px;height:128px;
      transform-origin:top center;
      animation:chimeSwing 3.3s ease-in-out infinite;
      filter:drop-shadow(0 4px 10px rgba(0,0,0,.26));
      pointer-events:none;z-index:3;
    }
    .windchime .ring{
      width:28px;height:10px;margin:0 auto;
      border:2px solid rgba(255,255,255,.95);
      border-radius:999px;
      background:rgba(255,255,255,.18);
    }
    .windchime .line{
      position:absolute;top:10px;width:2px;
      background:linear-gradient(to bottom,rgba(255,255,255,.95),rgba(255,255,255,.18));
      transform-origin:top center;
    }
    .windchime .line span{
      position:absolute;left:50%;transform:translateX(-50%);
      border-radius:999px;
      background:rgba(255,255,255,.92);
      box-shadow:0 0 10px rgba(255,255,255,.5);
    }
    .windchime .l1{left:17px;height:42px;animation:lineSwingA 3.2s ease-in-out infinite}
    .windchime .l2{left:35px;height:55px;animation:lineSwingB 3.2s ease-in-out infinite}
    .windchime .l3{left:53px;height:46px;animation:lineSwingC 3.2s ease-in-out infinite}
    .windchime .l1 span{bottom:-6px;width:8px;height:8px}
    .windchime .l2 span{bottom:-7px;width:10px;height:10px}
    .windchime .l3 span{bottom:-6px;width:8px;height:8px}
    .windchime .pendulum{
      position:absolute;left:35px;top:66px;transform:translateX(-50%);
      width:2px;height:42px;
      background:linear-gradient(to bottom,rgba(255,255,255,.85),rgba(255,255,255,.2));
    }
    .windchime .pendulum::after{
      content:"";
      position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);
      width:22px;height:14px;border-radius:4px 4px 8px 8px;
      background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(220,240,255,.72));
      box-shadow:0 0 12px rgba(255,255,255,.5);
    }
    @keyframes chimeSwing{0%,100%{transform:rotate(8deg)}50%{transform:rotate(-8deg)}}
    @keyframes lineSwingA{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-5deg)}}
    @keyframes lineSwingB{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-3deg)}}
    @keyframes lineSwingC{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}

    .widgets{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .widget{
      background:var(--glass);border:1px solid var(--glass-border);
      border-radius:18px;padding:10px 12px;backdrop-filter:blur(12px)
    }
    .widget .t{font-size:12px;opacity:.88}
    .widget .v{font-size:16px;font-weight:700;margin-top:4px}

    .grid{margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px}
    .icon{text-align:center;cursor:pointer}
    .ibox{
      width:62px;height:62px;margin:0 auto 6px;border-radius:16px;display:grid;place-items:center;
      background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.45);font-size:27px;
      transition:transform .12s ease;
    }
    .icon:active .ibox{transform:scale(.88)}
    .lab{font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.25)}

    /* Wechat list */
    .list{display:flex;flex-direction:column;gap:8px}
    .item{
      background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;
      display:flex;gap:10px;align-items:center;
    }
    .avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#eef2ff;flex-shrink:0}
    .main{flex:1;min-width:0;cursor:pointer}
    .name{font-weight:600;color:#222}
    .preview{margin-top:4px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t{font-size:11px;color:#999}

    /* Chat mode bar */
    .chat-mode-bar{
      height:var(--chat-mode-h);
      padding:6px 10px;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      background:linear-gradient(180deg,#f8f9ff,#f3f6ff);
      border-bottom:1px solid #e2e8fb;
    }
    .seg{
      display:flex;gap:6px;align-items:center;
      padding:4px;border-radius:12px;
      background:#e9eefc;border:1px solid #dce4fb;
    }
    .seg button{
      border:none;background:transparent;color:#38538d;
      padding:6px 10px;border-radius:9px;cursor:pointer;font-size:12px;
    }
    .seg button.active{
      background:#fff;color:#244ea5;font-weight:600;
      box-shadow:0 1px 3px rgba(35,67,137,.15);
    }

    /* Chat */
    #chatMsgs{
      height:calc(100% - (52px + var(--safe-top)) - var(--chat-mode-h) - (78px + var(--safe-bottom)));
      overflow:auto;
      padding:12px;
      background:linear-gradient(180deg,#edf2ff,#edf1f8);
      display:flex;flex-direction:column;gap:10px;
    }

    .msg-row{display:flex;gap:8px;align-items:flex-end}
    .msg-row.me{justify-content:flex-end}
    .chat-avatar{
      width:32px;height:32px;border-radius:10px;object-fit:cover;background:#dde6ff;flex-shrink:0;
    }
    .bubble{
      max-width:74%;
      padding:10px 12px;
      border-radius:14px;
      line-height:1.45;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .bubble.me{background:#2f66d8;color:#fff;border-bottom-right-radius:6px}
    .bubble.ai{background:#fff;border:1px solid #e8e8ef;border-bottom-left-radius:6px}
    .bubble.typing{opacity:.65}

    /* 线下酒馆风 */
    #chatRoom.offline-layout #chatMsgs{
      background:linear-gradient(180deg,#f1f5ff,#eef2ff);
      padding:10px 8px;
      gap:14px;
    }
    #chatRoom.offline-layout .msg-row{
      display:block;max-width:100%;
    }
    #chatRoom.offline-layout .msg-head{
      display:flex;align-items:center;gap:8px;margin:0 6px 6px;
      color:#5d678b;font-size:12px;font-weight:600;
    }
    #chatRoom.offline-layout .msg-row.me .msg-head{
      justify-content:flex-end;
    }
    #chatRoom.offline-layout .chat-avatar{
      width:42px;height:42px;border-radius:14px;
      box-shadow:0 2px 8px rgba(54,77,130,.14);
    }
    #chatRoom.offline-layout .bubble{
      max-width:100%;
      width:calc(100% - 14px);
      margin:0 7px;
      border-radius:16px;
      padding:12px 13px;
      line-height:1.62;
    }
    #chatRoom.offline-layout .msg-row.me .bubble{
      margin-left:auto;
      background:linear-gradient(180deg,#3773f3,#2f66d8);
      color:#fff;
      border-bottom-right-radius:10px;
    }
    #chatRoom.offline-layout .msg-row:not(.me) .bubble{
      background:#fff;
      border:1px solid #e4e9fb;
      border-bottom-left-radius:10px;
    }
    #chatRoom.offline-layout .status-block{
      display:block;
      background:#f8faff;
      border:1px dashed #cfdaff;
      border-radius:10px;
      padding:8px 9px;
      margin-bottom:8px;
      color:#4f5f8c;
      font-size:12px;
      line-height:1.5;
    }

    /* 输入区（统一风格） */
    .chatInputBar{
      position:absolute;left:0;right:0;bottom:0;
      padding:10px;
      padding-bottom:calc(10px + var(--safe-bottom));
      background:linear-gradient(180deg,#f8f9ff,#f4f7ff);
      border-top:1px solid #e2e8fb;
      display:flex;gap:8px;align-items:flex-end;
      box-shadow:0 -4px 16px rgba(56,89,162,.06);
    }
    #chatInput{
      flex:1;
      height:44px;
      min-height:44px;
      max-height:120px;
      overflow-y:auto;
      resize:none;
      border:1px solid #d8e1fb;
      background:#fff;
      border-radius:14px;
      padding:11px 12px;
      box-shadow:inset 0 1px 2px rgba(52,80,146,.06);
    }
    .send-actions{
      display:flex;gap:8px;align-items:center;align-self:flex-end;
    }
    .send-btn,.store-btn{
      height:42px;
      border:none;
      cursor:pointer;
      border-radius:12px;
      display:grid;place-items:center;
      transition:transform .12s ease, opacity .12s ease;
    }
    .send-btn:active,.store-btn:active{transform:translateY(1px) scale(.98)}
    .store-btn{
      width:42px;
      background:linear-gradient(160deg,#ecd8b4,#c89d62 58%,#9a6c3a);
      box-shadow:inset 0 1px 1px rgba(255,255,255,.4),0 3px 8px rgba(110,73,35,.22);
      border:1px solid rgba(140,92,49,.4);
      position:relative;
    }
    .store-btn::before{
      content:"";
      width:16px;height:16px;
      border-radius:999px;
      border:2px solid rgba(255,246,230,.9);
      box-shadow:inset 0 0 0 2px rgba(171,123,67,.45), 0 0 8px rgba(255,237,205,.5);
    }
    .send-btn{
      min-width:64px;
      padding:0 14px;
      color:#fff;font-weight:600;
      background:linear-gradient(160deg,var(--blue2),var(--blue));
      box-shadow:0 3px 10px rgba(47,102,216,.28);
      border:1px solid rgba(45,96,205,.55);
      font-size:14px;
    }

    /* modal */
    .modal{
      position:absolute;inset:0;background:rgba(0,0,0,.35);
      display:none;place-items:center;z-index:99;padding:12px;
    }
    .modal.active{display:grid}
    .modal-card{
      width:100%;max-width:360px;max-height:90dvh;overflow:auto;
      background:#fff;border-radius:14px;padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .preview-img{
      width:64px;height:64px;border-radius:12px;object-fit:cover;
      border:1px solid #eee;background:#f3f5ff;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <section id="home" class="screen active">
    <div class="wall"></div>
    <div class="home-layer">
      <div class="windchime" aria-hidden="true">
        <div class="ring"></div>
        <div class="line l1"><span></span></div>
        <div class="line l2"><span></span></div>
        <div class="line l3"><span></span></div>
        <div class="pendulum"></div>
      </div>

      <div class="date" id="homeDate"></div>
      <div class="time" id="homeTime"></div>

      <div class="widgets">
        <div class="widget"><div class="t">纪念日</div><div class="v">第 233 天</div></div>
        <div class="widget"><div class="t">天气</div><div class="v">22°C 晴</div></div>
      </div>

      <div class="grid">
        <div class="icon" data-nav="wechat"><div class="ibox">💬</div><div class="lab">微信</div></div>
        <div class="icon" data-nav="api"><div class="ibox">🔑</div><div class="lab">API</div></div>
      </div>
    </div>
  </section>

  <!-- WECHAT -->
  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>微信</b>
      <button class="btn" id="addContactBtn">+联系人</button>
    </div>
    <div class="page">
      <input id="searchInput" class="input" placeholder="搜索联系人" />
      <div id="contactList" class="list"></div>
    </div>
  </section>

  <!-- CHAT -->
  <section id="chatRoom" class="screen">
    <div class="header">
      <button class="btn" data-nav="wechat">‹ 返回</button>
      <b id="chatTitle">聊天</b>
      <button class="btn" id="clearChatBtn">清空</button>
    </div>

    <div class="chat-mode-bar">
      <div class="seg" id="modeSeg">
        <button id="modeOnlineBtn" class="active">线上</button>
        <button id="modeOfflineBtn">线下</button>
      </div>
      <div class="seg" id="onlineStyleSeg">
        <button id="styleFreeBtn" class="active">自由</button>
        <button id="styleRangeBtn">区间</button>
      </div>
    </div>

    <div id="chatMsgs"></div>

    <div class="chatInputBar">
      <textarea id="chatInput" class="ta" placeholder="输入消息..."></textarea>
      <div class="send-actions">
        <button class="store-btn" id="storeBtn" title="储存" aria-label="储存"></button>
        <button class="send-btn" id="sendBtn">发送</button>
      </div>
    </div>
  </section>

  <!-- API -->
  <section id="api" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>API 设置</b>
      <button class="btn p" id="saveApiBtn">保存</button>
    </div>
    <div class="page">
      <div class="card">
        <div class="small">API预设</div>
        <div class="row" style="margin-top:8px;">
          <select id="apiPresetSelect" class="select"></select>
          <button class="btn" id="newPresetBtn">新建</button>
          <button class="btn d" id="delPresetBtn">删</button>
        </div>
      </div>

      <div class="card"><div class="small">Base URL</div><input id="apiBase" class="input" placeholder="https://api.cetaceang.qzz.io" /></div>
      <div class="card"><div class="small">API Key</div><input id="apiKey" class="input" type="password" /></div>
      <div class="card">
        <div class="small">Model</div>
        <select id="apiModel" class="select"></select>
        <div style="margin-top:8px"><button class="btn" id="fetchModelsBtn">拉取模型</button></div>
      </div>
      <div class="card"><div class="small">Temperature</div><input id="apiTemp" class="input" type="number" min="0" max="2" step="0.1" value="0.8" /></div>

      <div class="card">
        <div class="small"><b>聊天模式配置（保存后为默认值）</b></div>
        <div class="small" style="margin-top:8px;">默认模式</div>
        <select id="defaultModeSelect" class="select">
          <option value="online">线上</option>
          <option value="offline">线下</option>
        </select>

        <div class="small" style="margin-top:10px;">线上回复模式</div>
        <select id="onlineStyleSelect" class="select">
          <option value="free">自由条数（AI自行平衡）</option>
          <option value="range">区间条数（在范围内随机）</option>
        </select>

        <div class="row" style="margin-top:10px;">
          <div style="flex:1">
            <div class="small">线上最少条数</div>
            <input id="onlineMinInput" class="input" type="number" min="1" max="20" value="2" />
          </div>
          <div style="flex:1">
            <div class="small">线上最多条数</div>
            <input id="onlineMaxInput" class="input" type="number" min="1" max="30" value="5" />
          </div>
        </div>

        <div class="row" style="margin-top:10px;">
          <div style="flex:1">
            <div class="small">线下最小字数</div>
            <input id="offlineMinLenInput" class="input" type="number" min="60" max="2000" value="140" />
          </div>
          <div style="flex:1">
            <div class="small">线下最大字数</div>
            <input id="offlineMaxLenInput" class="input" type="number" min="80" max="2400" value="280" />
          </div>
        </div>

        <div class="small" style="margin-top:8px;color:#5f6b92;">切换线上/线下在聊天页会立即生效，不需要重进聊天。</div>
      </div>

      <div class="card">
        <button class="btn" id="testApiBtn">测试连接</button>
        <div id="apiStatus" class="small" style="margin-top:8px;">状态：未测试</div>
      </div>
    </div>
  </section>

  <!-- 创建联系人 -->
  <div id="contactModal" class="modal">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">创建联系人</h3>
      <div class="small">昵称</div>
      <input id="newName" class="input" placeholder="例如：沈昼白" />

      <div class="small" style="margin-top:8px;">头像（上传 或 URL）</div>
      <div class="row">
        <button class="btn" id="pickAvatarBtn">上传</button>
        <input id="newAvatarUrl" class="input" placeholder="https://..." />
      </div>
      <input id="newAvatarFile" type="file" accept="image/*" class="hidden" />
      <img id="newAvatarPreview" class="preview-img hidden" style="margin-top:8px;" />

      <div class="small" style="margin-top:8px;">人设</div>
      <textarea id="newPersona" class="ta" style="min-height:220px;"></textarea>

      <div class="row" style="justify-content:flex-end;margin-top:10px;">
        <button class="btn" id="cancelCreateBtn">取消</button>
        <button class="btn p" id="saveCreateBtn">保存</button>
      </div>
    </div>
  </div>

</div>

<script>
(() => {
  const K_CONTACT='mp_fix_contacts';
  const K_CHAT='mp_fix_chats';
  const K_API='mp_fix_api';
  const K_ME='mp_fix_me';
  const K_PREF='mp_fix_chat_pref_v133';

  let currentId=null;
  let createAvatar='';

  const $ = id => document.getElementById(id);
  const getJ=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));}catch{return d;}};
  const setJ=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
  const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  const clean=s=>String(s||'').replace(/[\u0000-\u001F\u007F\uFFFD]/g,'').trim();
  const clamp=(n,min,max)=>Math.max(min,Math.min(max,n));

  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const el=$(id); if(el) el.classList.add('active');
  }

  // nav
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>show(el.getAttribute('data-nav')));

  // time
  function tick(){
    const n=new Date(), h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()).padStart(2,'0');
    const w=['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
    $('homeDate').textContent=`${n.getMonth()+1}月${n.getDate()}日 ${w}`;
    $('homeTime').textContent=`${h}:${m}`;
  }
  tick(); setInterval(tick,1000);

  // data
  function getContacts(){
    let arr=getJ(K_CONTACT,null);
    if(!arr){
      arr=[{
        id:'c1',
        name:'沈昼白',
        avatar:'https://i.postimg.cc/y8xWzCqj/anime-boy.jpg',
        preview:'在吗 我刚遛狗回来',
        time:'刚刚',
        persona:'计算机系大三，爱分享日常'
      }];
      setJ(K_CONTACT,arr);

  function compressImage(file,maxSide=260,quality=0.5){
    return new Promise((resolve,reject)=>{
      const fr=new FileReader();
      fr.onload=()=>{
        const img=new Image();
        img.onload=()=>{
          let w=img.width,h=img.height;
          const s=Math.min(1,maxSide/Math.max(w,h));
          w=Math.round(w*s); h=Math.round(h*s);
          const c=document.createElement('canvas');
          c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          let out='';
          try{ out=c.toDataURL('image/webp',quality);}catch(e){}
          if(!out || out.startsWith('data:,')) out=c.toDataURL('image/jpeg',quality);
          resolve(out);
        };
        img.onerror=reject;
        img.src=fr.result;
      };
      fr.onerror=reject;
      fr.readAsDataURL(file);
    });
  }

  function splitLongByLen(text, len=30){
    const out=[];
    let i=0;
    while(i<text.length){
      out.push(text.slice(i,i+len));
      i+=len;
    }
    return out;
  }

  function normalizeBubbleCount(arr,min,max){
    let list=[...arr].filter(Boolean);
    if(!list.length) return ['...'];

    // 太多就合并到 max（不死板限制，只在 range 模式下应用）
    while(list.length>max){
      const tail=list.pop();
      list[list.length-1] = (list[list.length-1] + ' ' + tail).trim();
    }

    // 太少就拆长句到 min
    while(list.length<min){
      let idx=-1, longest=0;
      for(let i=0;i<list.length;i++){
        if(list[i].length>longest){longest=list[i].length;idx=i;}
      }
      if(idx<0 || list[idx].length<12) break;
      const target=list[idx];
      const cut=Math.floor(target.length/2);
      const a=target.slice(0,cut).trim();
      const b=target.slice(cut).trim();
      list.splice(idx,1,a,b);
    }
    return list.filter(Boolean);
  }

  function splitOnlineBubbles(raw){
    const p=getPref();
    let txt=clean(raw);
    if(!txt) return ['...'];

    // 去掉可能的代码块包裹
    txt=txt.replace(/^```[\w-]*\n?/,'').replace(/```$/,'');

    // 优先按换行（模型已被要求一行一泡）
    let lines = txt
      .split(/\n+/)
      .map(s=>s.replace(/^\s*([-\d]+[\.、\)]|[•·])\s*/,'').trim())
      .filter(Boolean);

    // 如果没有明显换行，就按语义标点拆
    if(lines.length<=1){
      lines = txt.match(/[^。！？!?；;，,\n]+[。！？!?；;，,]?/g) || [txt];
      lines = lines.map(s=>s.trim()).filter(Boolean);
    }

    const bubbles=[];
    for(let line of lines){
      if(line.length<=32){ bubbles.push(line); continue; }

      // 按句号层面再拆
      const sub = line.match(/[^。！？!?；;]+[。！？!?；;]?/g) || [line];
      let buf='';
      for(let s of sub){
        s=s.trim(); if(!s) continue;
        if(s.length>34){
          if(buf){ bubbles.push(buf); buf=''; }
          bubbles.push(...splitLongByLen(s,30));
          continue;
        }
        if((buf+s).length<=34){ buf+=s; }
        else { if(buf) bubbles.push(buf); buf=s; }
      }
      if(buf) bubbles.push(buf);
    }

    let finalList = bubbles.map(s=>s.trim()).filter(Boolean);

    // 在线区间模式才进行条数区间平衡；自由模式不限制死条数
    if(p.onlineStyle==='range'){
      finalList = normalizeBubbleCount(finalList, p.onlineMin, p.onlineMax);
    }

    // 兜底
    if(!finalList.length) finalList=['...'];
    return finalList;
  }

  async function emitAiSequential(parts,map){
    for(let i=0;i<parts.length;i++){
      const t=parts[i];
      map[currentId].push({role:'assistant',text:t,time:Date.now()});
      setChats(map);
      renderChat();

      // 首条快，后续慢，且按阅读长度算时间（确保你能看完）
      let delay;
      if(i===0){
        delay = 700 + Math.floor(Math.random()*300);
      }else{
        const readCost = clamp(1100 + t.length * 90, 1200, 4200);
        delay = readCost + Math.floor(Math.random()*260);
      }
      await new Promise(r=>setTimeout(r,delay));
    }
  }

  async function callApi(messages){
    const cfg=saveApiForm();
    if(!cfg.base||!cfg.key) throw new Error('请先配置 Base URL 和 API Key');
    const url=buildUrl(cfg.base,'/v1/chat/completions');

    const r=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.key},
      body:JSON.stringify({
        model:cfg.model,
        temperature:cfg.temp,
        messages
      })
    });
    const data=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(data?.error?.message || ('HTTP '+r.status));
    return clean(data?.choices?.[0]?.message?.content||'');
  }

  async function sendMsg(){
    if(!currentId) return;
    const p=getPref();

    const t=clean($('chatInput').value);
    if(t) pushUser(t);
    $('chatInput').value=''; resetInputH(); renderChat();

    const map=getChats();
    const hist=(map[currentId]||[]).filter(x=>x.text && x.text!=='...');
    if(!hist.length) return;

    map[currentId].push({role:'assistant',text:'对方正在输入…',typing:true,time:Date.now()});
    setChats(map); renderChat();

    try{
      const c=getContacts().find(x=>x.id===currentId);
      const systemPrompt = p.mode==='online' ? buildOnlinePrompt(c,p) : buildOfflinePrompt(c,p);

      const messages=[
        {role:'system',content:systemPrompt},
        ...hist.slice(-28).map(x=>({role:x.role==='user'?'user':'assistant',content:x.text}))
      ];

      const out=await callApi(messages);

      const arr=map[currentId];
      if(arr.length && arr[arr.length-1].typing) arr.pop();

      if(p.mode==='online'){
        const parts=splitOnlineBubbles(out);
        await emitAiSequential(parts, map);

        const contacts=getContacts();
        const i=contacts.findIndex(x=>x.id===currentId);
        if(i>=0){
          contacts[i].preview=parts[0]||'...';
          contacts[i].time='刚刚';
          setContacts(contacts);
        }
        renderContacts($('searchInput').value||'');
      }else{
        // 线下：只回一条长消息
        await new Promise(r=>setTimeout(r,900 + Math.floor(Math.random()*400)));
        map[currentId].push({role:'assistant',text:out||'…',time:Date.now()});
        setChats(map); renderChat();

        const contacts=getContacts();
        const i=contacts.findIndex(x=>x.id===currentId);
        if(i>=0){
          contacts[i].preview='[线下沉浸回复]';
          contacts[i].time='刚刚';
          setContacts(contacts);
        }
        renderContacts($('searchInput').value||'');
      }
    }catch(e){
      const arr=map[currentId];
      if(arr.length && arr[arr.length-1].typing) arr.pop();
      arr.push({role:'assistant',text:'请求失败：'+clean(e.message),time:Date.now()});
      setChats(map); renderChat();
    }
  }

  $('sendBtn').onclick=sendMsg;

  // Enter 默认储存；Ctrl/Cmd + Enter 发送
  $('chatInput').addEventListener('keydown',e=>{
    if(e.key==='Enter' && !e.shiftKey){
      e.preventDefault();
      if(e.ctrlKey || e.metaKey){
        sendMsg();
      }else{
        storeCurrentInput();
      }
    }
  });

  // init
  refreshPresetUI();
  renderContacts();
  applyModeUI();
})();
</script>
</body>
</html>
