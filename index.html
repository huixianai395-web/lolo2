
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>稳定测试版</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:-apple-system,PingFang SC,Microsoft YaHei;background:#000}
  #app{max-width:430px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:#111}
  .screen{position:absolute;inset:0;display:none;background:#f7f7fb}
  .screen.active{display:block}
  .header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#fff;border-bottom:1px solid #e9e9ef}
  .btn{border:none;border-radius:10px;padding:8px 12px;background:#edf2ff;color:#173a7a}
  .btn.p{background:#2f66d8;color:#fff}
  .page{height:calc(100% - 52px);overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
  .card{background:#fff;border:1px solid #ececf2;border-radius:12px;padding:12px}
  .input,.ta{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px}
  .ta{min-height:42px;max-height:100px;resize:none}
  .small{font-size:12px;color:#777}

  #home{color:#fff}
  .wall{position:absolute;inset:0;background:linear-gradient(160deg,#3e6cff,#87ddff)}
  .home-layer{position:relative;height:100%;padding:18px}
  .date{font-size:15px;opacity:.9}
  .time{font-size:64px;font-weight:700}
  .grid{margin-top:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .icon{text-align:center;cursor:pointer}
  .ibox{width:62px;height:62px;margin:0 auto 6px;border-radius:16px;background:rgba(255,255,255,.3);display:grid;place-items:center;font-size:27px;border:1px solid rgba(255,255,255,.45)}
  .lab{font-size:12px}

  .item{background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  #chatMsgs{height:calc(100% - 52px - 62px);overflow:auto;padding:12px;background:#eef1f6;display:flex;flex-direction:column;gap:10px}
  .bubble{max-width:78%;padding:10px 12px;border-radius:12px;white-space:pre-wrap;word-break:break-word}
  .me{margin-left:auto;background:#2f66d8;color:#fff}
  .ai{background:#fff;border:1px solid #e8e8ef}
  .chatbar{position:absolute;left:0;right:0;bottom:0;padding:10px;background:#fff;border-top:1px solid #e9e9ef;display:flex;gap:8px;align-items:flex-end}
  #chatInput{flex:1;min-height:42px;max-height:96px;overflow:auto;resize:none}
</style>
</head>
<body>
<div id="app">
  <section id="home" class="screen active">
    <div class="wall"></div>
    <div class="home-layer">
      <div class="date" id="d"></div>
      <div class="time" id="t"></div>
      <div class="grid">
        <div class="icon" onclick="go('wechat')"><div class="ibox">💬</div><div class="lab">微信</div></div>
        <div class="icon" onclick="go('api')"><div class="ibox">🔑</div><div class="lab">API</div></div>
      </div>
    </div>
  </section>

  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" onclick="go('home')">‹ 返回</button>
      <b>微信</b>
      <button class="btn" onclick="addFriend()">+联系人</button>
    </div>
    <div class="page">
      <input id="kw" class="input" placeholder="搜索联系人" oninput="renderList()">
      <div id="list"></div>
    </div>
  </section>

  <section id="chat" class="screen">
    <div class="header">
      <button class="btn" onclick="go('wechat')">‹ 返回</button>
      <b id="chatName">聊天</b>
      <button class="btn" onclick="clearChat()">清空</button>
    </div>
    <div id="chatMsgs"></div>
    <div class="chatbar">
      <textarea id="chatInput" class="ta" placeholder="输入消息..."></textarea>
      <button class="btn p" onclick="send()">发送</button>
    </div>
  </section>

  <section id="api" class="screen">
    <div class="header">
      <button class="btn" onclick="go('home')">‹ 返回</button>
      <b>API设置</b>
      <button class="btn p" onclick="saveApi()">保存</button>
    </div>
    <div class="page">
      <div class="card"><div class="small">Base URL</div><input id="base" class="input" placeholder="https://api.cetaceang.qzz.io"></div>
      <div class="card"><div class="small">API Key</div><input id="key" class="input" type="password"></div>
      <div class="card"><div class="small">Model</div><input id="model" class="input" value="gpt-4o-mini"></div>
      <div class="card"><div class="small">Temperature</div><input id="temp" class="input" type="number" min="0" max="2" step="0.1" value="0.8"></div>
      <div class="card">
        <button class="btn" onclick="testApi()">测试连接</button>
        <div id="status" class="small" style="margin-top:8px">状态：未测试</div>
      </div>
    </div>
  </section>
</div>

<script>
const K1='s_api_v1',K2='s_contacts_v1',K3='s_chat_v1';
let cur='';

function go(id){ document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function jget(k,d){ try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d)); }catch{return d; } }
function jset(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function esc(s=''){ return String(s).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

function tick(){
  const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0');
  const w=['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
  d.textContent=`${n.getMonth()+1}月${n.getDate()}日 ${w}`; t.textContent=`${h}:${m}`;
}
setInterval(tick,1000); tick();

function contacts(){
  let a=jget(K2,null);
  if(!a){ a=[{id:'c1',name:'沈昼白',preview:'在吗',persona:'自然聊天'}]; jset(K2,a); }
  return a;
}
function setContacts(a){ jset(K2,a); }

function renderList(){
  const k=(kw.value||'').trim();
  const a=contacts().filter(x=>!k||x.name.includes(k)||x.preview.includes(k));
  list.innerHTML=a.map(x=>`
    <div class="item" onclick="openChat('${x.id}')">
      <div><b>${esc(x.name)}</b><div class="small">${esc(x.preview||'')}</div></div>
      <button class="btn" onclick="event.stopPropagation();editFriend('${x.id}')">编辑</button>
    </div>
  `).join('') || '<div class="card small">暂无联系人</div>';
}
function addFriend(){
  const name=(prompt('联系人昵称')||'').trim(); if(!name) return;
  const persona=(prompt('人设(可空)')||'').trim();
  const a=contacts(); a.unshift({id:'c'+Date.now(),name,preview:'新的聊天已创建',persona}); setContacts(a); renderList();
}
function editFriend(id){
  const a=contacts(); const i=a.findIndex(x=>x.id===id); if(i<0) return;
  const name=(prompt('修改昵称',a[i].name)||'').trim(); if(!name) return;
  const persona=(prompt('修改人设',a[i].persona||'')||'').trim();
  a[i].name=name; a[i].persona=persona; setContacts(a); renderList();
}

function cmap(){ return jget(K3,{}); }
function setMap(m){ jset(K3,m); }

function openChat(id){
  cur=id; const c=contacts().find(x=>x.id===id); chatName.textContent=c?c.name:'聊天';
  drawChat(); go('chat');
}
window.openChat=openChat;

function drawChat(){
  const m=cmap(); const arr=m[cur]||[];
  chatMsgs.innerHTML=arr.map(x=>`<div class="bubble ${x.role==='user'?'me':'ai'}">${esc(x.text)}</div>`).join('');
  chatMsgs.scrollTop=chatMsgs.scrollHeight;
}
function clearChat(){
  if(!cur) return; if(!confirm('清空当前聊天？')) return;
  const m=cmap(); m[cur]=[]; setMap(m); drawChat();
}
chatInput.addEventListener('input',()=>{ chatInput.style.height='42px'; chatInput.style.height=Math.min(chatInput.scrollHeight,96)+'px'; });
chatInput.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });

function cfg(){ return jget(K1,{base:'',key:'',model:'gpt-4o-mini',temp:0.8}); }
function saveApi(){
  const c={base:base.value.trim(),key:key.value.trim(),model:model.value.trim()||'gpt-4o-mini',temp:Number(temp.value||0.8)};
  jset(K1,c); status.textContent='状态：已保存'; return c;
}
function loadApi(){
  const c=cfg(); base.value=c.base||''; key.value=c.key||''; model.value=c.model||'gpt-4o-mini'; temp.value=c.temp??0.8;
}
function url(baseUrl){
  const b=(baseUrl||'').replace(/\/+$/,'');
  return b.endsWith('/v1')?b+'/chat/completions':b+'/v1/chat/completions';
}
async function call(messages){
  const c=saveApi(); if(!c.base||!c.key) throw new Error('先填 Base URL 和 API Key');
  const r=await fetch(url(c.base),{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+c.key},
    body:JSON.stringify({model:c.model,temperature:c.temp,messages})
  });
  const d=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d?.error?.message||('HTTP '+r.status));
  return d?.choices?.[0]?.message?.content?.trim()||'';
}
async function testApi(){
  try{ status.textContent='状态：测试中...'; const out=await call([{role:'user',content:'只回复 ok'}]); status.textContent='状态：连接成功 -> '+(out||'ok'); }
  catch(e){ status.textContent='状态：失败 -> '+e.message; }
}
window.testApi=testApi;

async function send(){
  const t=(chatInput.value||'').trim(); if(!t||!cur) return;
  const m=cmap(); m[cur]=m[cur]||[]; m[cur].push({role:'user',text:t}); chatInput.value=''; setMap(m); drawChat();

  m[cur].push({role:'assistant',text:'...'}); setMap(m); drawChat();

  try{
    const c=contacts().find(x=>x.id===cur);
    const hist=(m[cur]||[]).filter(x=>x.text!=='...').slice(-20);
    const messages=[{role:'system',content:`你是${c?.name||'聊天对象'}，人设：${c?.persona||'自然聊天'}。回复自然简短。`}, ...hist.map(x=>({role:x.role==='user'?'user':'assistant',content:x.text}))];
    const out=await call(messages);
    const arr=m[cur]; if(arr.length&&arr[arr.length-1].text==='...') arr.pop();
    arr.push({role:'assistant',text:out||'...'}); setMap(m); drawChat();
  }catch(e){
    const arr=m[cur]; if(arr.length&&arr[arr.length-1].text==='...') arr.pop();
    arr.push({role:'assistant',text:'请求失败：'+e.message}); setMap(m); drawChat();
  }
}

loadApi();
renderList();
</script>
</body>
</html>
